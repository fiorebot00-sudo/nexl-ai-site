}

// ---------- draw ----------
// ---------- splash / overlay furniture (D-adr-024) ----------
// Every splash dims the play behind it (readability) and sits on a faint tinted
// panel with a soft border — the visual signal to STOP and read, tap to continue.
function dimScreen(a) {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = 'rgba(4,5,10,' + (0.74 * a).toFixed(3) + ')';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
}
function panelBox(cx, cy, w, h, a) {
  const x = cx - w / 2, y = cy - h / 2, r = 16;
  ctx.globalAlpha = a;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  ctx.fillStyle = 'rgba(24,32,52,0.55)';       // faint "read me" tint
  ctx.fill();
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(126,240,255,0.22)';  // soft cyan edge (player register)
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function draw() {
  const now = performance.now() / 1000;
  const galaxy = galaxyFor(game.depth);
  const dim = lapDim(game.depth);
  // signature/ambient motion freezes during flight (one-moving-focal-point rule)
  const sigT = game.state === 'flight' ? game.freezeT : now;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  if (galaxy.bgGrad) {                // E1: vertical depth (or inversion — Shallows)
    const bgg = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgg.addColorStop(0, galaxy.bgGrad[0]); bgg.addColorStop(1, galaxy.bgGrad[1]);
    ctx.fillStyle = bgg;
  } else {
    ctx.fillStyle = galaxy.bg;
  }
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // A3 galaxy light wash: one soft ground-up ambient glow in the galaxy's own
  // hue — "the launch site has a light source". Screen space, behind everything.
  if (LOOK.on && LOOK.wash) {
    const cw = canvas.width, ch = canvas.height;
    const wg = ctx.createRadialGradient(cw / 2, ch * 1.08, ch * 0.05, cw / 2, ch * 1.08, ch * 0.85);
    wg.addColorStop(0, 'rgba(' + galaxy.decor.hues[0] + ',' + (0.10 * LOOK.wash * dim).toFixed(3) + ')');
    wg.addColorStop(0.55, 'rgba(' + galaxy.decor.hues[0] + ',' + (0.035 * LOOK.wash * dim).toFixed(3) + ')');
    wg.addColorStop(1, 'rgba(' + galaxy.decor.hues[0] + ',0)');
    ctx.fillStyle = wg;
    ctx.fillRect(0, 0, cw, ch);
  }

  let shx = 0, shy = 0;
  if (game.shake > 0) {
    const p = (performance.now() - (game.shakeAt || 0)) / ((game.shakeDur || 0.42) * 1000);
    if (p >= 0 && p < 1) {                        // p<0 == inside the hitstop (frozen)
      const amp = game.shake * (1 - p);           // css px, decaying
      shx = (Math.random() - 0.5) * 2 * amp + (game.shakeKx || 0) * Math.pow(1 - p, 2);
      shy = (Math.random() - 0.5) * 2 * amp + (game.shakeKy || 0) * Math.pow(1 - p, 2);
    }
  }
  ctx.setTransform(scale, 0, 0, scale, ox + shx * scale, oy + shy * scale);

  const S = game.sys;
  // A1 star tint: pull the field toward the galaxy's primary hue (LOOK.tint of
  // the way from the neutral #cfe0ff). Base 207,224,255; hues are 'r,g,b'.
  let starCol = '#cfe0ff';
  if (LOOK.on && LOOK.tint) {
    const h = galaxy.decor.hues[0].split(',');
    starCol = 'rgb(' + Math.round(207 + (h[0] - 207) * LOOK.tint) + ',' +
                       Math.round(224 + (h[1] - 224) * LOOK.tint) + ',' +
                       Math.round(255 + (h[2] - 255) * LOOK.tint) + ')';
  }
  ctx.fillStyle = starCol;
  ctx.strokeStyle = starCol;
  ctx.lineWidth = 1;
  // A2 ship-keyed micro-parallax: in flight the layers lean fractionally away
  // from the ship's offset from center — a depth cue, not a camera. Layer
  // factor scales with drift speed (near layer = strongest, ~2% of offset).
  let plx = 0, ply = 0;
  if (LOOK.on && LOOK.parallax && game.state === 'flight' && game.craft) {
    plx = (game.craft.x - VW / 2) * 0.02 * LOOK.parallax;
    ply = (game.craft.y - VH / 2) * 0.02 * LOOK.parallax;
  }
  for (const L of STAR_LAYERS) {
    const pf = L.speed / 26;   // 26 = fastest layer's speed
    for (let i = 0; i < L.stars.length; i++) {
      const s = L.stars[i];
      // galaxy star tuning: deterministic density thinning + alpha scale (heroes exempt)
      if (!s.hero && (i % 20) >= galaxy.stars.density * 20) continue;
      const sx = ((s.x - plx * pf) % VW + VW) % VW;
      const sy = ((s.y + now * L.speed - ply * pf) % VH + VH) % VH;
      let sa = s.hero ? s.a : Math.min(s.a * galaxy.stars.alpha * dim, 0.55);
      // A1 twinkle: gentle per-star phase; heroes stay steady (the last lights)
      if (LOOK.on && LOOK.twinkle && !s.hero)
        sa *= 1 - 0.15 * LOOK.twinkle * (0.5 + 0.5 * Math.sin(now * 1.8 + i * 2.399 + L.speed));
      // E2: per-galaxy star glyph — plotter squares (Blueprint), infall streaks
      // (the Lens); hero stars stay dots everywhere (the last lights)
      if (galaxy.skyMode === 'squares' && !s.hero) {
        ctx.globalAlpha = sa;
        ctx.fillRect(sx, sy, 1.4, 1.4);
      } else if (galaxy.skyMode === 'streaks' && !s.hero) {
        const at2 = Math.atan2(-240 - sy, VW / 2 - sx);
        ctx.globalAlpha = sa * 0.8;
        ctx.beginPath(); ctx.moveTo(sx, sy);
        ctx.lineTo(sx + Math.cos(at2) * 5, sy + Math.sin(at2) * 5); ctx.stroke();
      } else {
        ctx.globalAlpha = sa;
        ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, 7); ctx.fill();
      }
    }
  }
  ctx.globalAlpha = 1;
  drawSkyExtras(galaxy, sigT, dim);   // E2: bubbles / snow / ash / spores / plankton
  drawScenery(galaxy, sigT);          // E4: silhouette layer (darker than bg — free variety)

  drawSignature(galaxy, game.depth, sigT, dim);
  drawBackdrop(galaxy, game.depth, dim);   // rare binary star (Crimson Shoals) / giant planet (Event Horizon)

  // per-system atmosphere (nebula / Oort band)
  const D = S.decor;
  if (D && D.type === 'nebula') {
    for (let bi = 0; bi < D.blobs.length; bi++) {
      const b = D.blobs[bi];
      const ng = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      ng.addColorStop(0, 'rgba(' + b.hue + ',' + b.a + ')');
      ng.addColorStop(1, 'rgba(' + b.hue + ',0)');
      ctx.fillStyle = ng;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
    }
  } else if (D && D.type === 'brush') {
    // Violet Deep: tapered ink strokes instead of nebula murk
    ctx.fillStyle = 'rgb(170,130,255)';
    for (const st of D.strokes) {
      ctx.globalAlpha = st.a * dim;
      const ex2 = st.x + Math.cos(st.ang) * st.len, ey2 = st.y + Math.sin(st.ang) * st.len;
      const px2 = Math.cos(st.ang + Math.PI / 2), py2 = Math.sin(st.ang + Math.PI / 2);
      const mx2 = (st.x + ex2) / 2 + px2 * st.w * 0.35, my2 = (st.y + ey2) / 2 + py2 * st.w * 0.35;
      ctx.beginPath();
      ctx.moveTo(st.x - px2 * st.w / 2, st.y - py2 * st.w / 2);
      ctx.quadraticCurveTo(mx2, my2, ex2 - px2, ey2 - py2);
      ctx.lineTo(ex2 + px2, ey2 + py2);
      ctx.quadraticCurveTo((st.x + ex2) / 2 - px2 * st.w * 0.15, (st.y + ey2) / 2 - py2 * st.w * 0.15,
                           st.x + px2 * st.w / 2, st.y + py2 * st.w / 2);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (D && D.type === 'oort') {
    ctx.fillStyle = '#cfe8ff';
    for (const sp of D.specks) {
      ctx.globalAlpha = sp.a;
      ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  drawAmbient(now);

  for (const p of S.layout.planets) {
    for (let k = 1; k <= 3; k++) {
      ctx.globalAlpha = 0.10 - k * 0.025;
      ctx.strokeStyle = '#9fb4ff';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (1 + k * 0.85), 0, 7); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  for (const p of S.layout.planets) drawPlanet(p);

  // orbiters — always in motion (D-adr-022): live clock on the ground and after
  // the flight, physics time (phase-continuous) while flying
  const tOrb = game.state === 'flight' ? game.craft.t0 + game.craft.t : orbNow();
  for (const m of S.layout.moons) {
    const pl = S.layout.planets[m.pi];
    ctx.strokeStyle = 'rgba(255,157,138,0.10)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(pl.x, pl.y, m.orbR, 0, 7); ctx.stroke();
    const [mx, my] = orbPos(S.layout, m, tOrb);
    drawMoon(mx, my, m.r);
  }
  for (const s of S.layout.sats) {
    if (s.got) continue;
    const pl = S.layout.planets[s.pi];
    ctx.strokeStyle = 'rgba(255,209,102,0.10)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(pl.x, pl.y, s.orbR, 0, 7); ctx.stroke();
    const [sx, sy] = orbPos(S.layout, s, tOrb);
    drawSat(sx, sy, now);
  }

  drawGate(S.layout.gate, now);

  // FLIGHT ASSIST (D-adr-032): after 2 fails on a system, trace a soft cyan
  // corridor along the first part of the verified solution + a pulsing launch-
  // direction arrow at the pad — a shape to aim toward, not the exact shot.
  // Idle-aim only (vanishes the moment you start dragging); widens at 3+ fails.
  if (game.state === 'aim' && !game.drag && (game.sysFails || 0) >= 2 && game.sys.sol && !PLAYGROUND) {
    const sol = game.sys.sol;
    const hp = simulate(game.sys.layout, sol.vx, sol.vy, 6).path;
    const np = hp.length / 2;
    const lim = Math.max(2, Math.floor(np * (game.sysFails >= 3 ? 0.7 : 0.42)));
    ctx.save(); ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(126,240,255,0.10)'; ctx.lineWidth = 22;
    ctx.beginPath(); ctx.moveTo(hp[0], hp[1]);
    for (let i = 1; i < lim; i++) ctx.lineTo(hp[i * 2], hp[i * 2 + 1]);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(126,240,255,0.22)'; ctx.lineWidth = 7; ctx.stroke();
    const ang = Math.atan2(sol.vy, sol.vx), pulse = 0.55 + 0.35 * Math.sin(now * 4), al = 46;
    const axx = PAD.x + Math.cos(ang) * al, ayy = PAD.y + Math.sin(ang) * al;
    ctx.strokeStyle = 'rgba(126,240,255,' + pulse.toFixed(2) + ')'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(PAD.x, PAD.y); ctx.lineTo(axx, ayy); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(axx, ayy); ctx.lineTo(axx - Math.cos(ang - 0.4) * 8, ayy - Math.sin(ang - 0.4) * 8);
    ctx.moveTo(axx, ayy); ctx.lineTo(axx - Math.cos(ang + 0.4) * 8, ayy - Math.sin(ang + 0.4) * 8);
    ctx.stroke();
    ctx.textAlign = 'center'; ctx.globalAlpha = 0.6; ctx.fillStyle = '#7ef0ff';
    ctx.font = '700 11px Oxanium, -apple-system, sans-serif';
    ctx.fillText('FLIGHT ASSIST - aim along the lane', VW / 2, VH - 84);
    ctx.globalAlpha = 1; ctx.restore();
  }

  // drag focus: dim the scene a touch so the aim line owns the eye
  if (game.state === 'aim' && game.drag && game.preview) {
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(-20, -20, VW + 40, VH + 40);
  }

  // planet-surface horizon with the launch complex (galaxy-themed ground)
  const gTop = lerpColor(galaxy.bg, (galaxy.ground && galaxy.ground.top) || '#3a4150', 0.55);
  const gBot = lerpColor(galaxy.bg, '#0a0c12', 0.6);
  const gg2 = ctx.createLinearGradient(0, VH - 56, 0, VH);
  gg2.addColorStop(0, gTop); gg2.addColorStop(1, gBot);
  ctx.fillStyle = gg2;
  ctx.beginPath(); ctx.arc(VW / 2, VH + 560, 611, 0, 7); ctx.fill();
  ctx.strokeStyle = 'rgba(200,220,255,0.10)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(VW / 2, VH + 560, 611, 0, 7); ctx.stroke();
  drawGround(galaxy, now);            // galaxy-signature terrain (name implies the site)
  // elevated platform + legs
  ctx.fillStyle = '#39414a';
  ctx.fillRect(PAD.x - 17, 743, 34, 4.5);
  ctx.fillRect(PAD.x - 13, 747.5, 3, 7);
  ctx.fillRect(PAD.x + 10, 747.5, 3, 7);
  // gantry tower with service arm and braces
  ctx.strokeStyle = '#4a5563'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(PAD.x - 24, 750); ctx.lineTo(PAD.x - 24, 714); ctx.stroke();
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD.x - 24, 722); ctx.lineTo(PAD.x - 10, 726);
  ctx.moveTo(PAD.x - 28, 750); ctx.lineTo(PAD.x - 24, 740);
  ctx.moveTo(PAD.x - 20, 750); ctx.lineTo(PAD.x - 24, 740);
  ctx.stroke();
  // launch telemetry below the platform: live while aiming, last shot otherwise
  if (game.state === 'aim') {
    const tv = (game.drag && game.previewVel) ? game.previewVel : game.lastShot;
    if (tv) {
      const live = !!(game.drag && game.previewVel);
      const spd = Math.hypot(tv.vx, tv.vy);
      const angDeg = (Math.atan2(-tv.vy, tv.vx) * 180 / Math.PI + 360) % 360;
      const thr = Math.round(Math.min((spd - MIN_V) / (MAX_V - MIN_V), 1) * 100);
      ctx.textAlign = 'center';
      ctx.font = '600 11px Oxanium, -apple-system, sans-serif';
      ctx.globalAlpha = live ? 0.95 : 0.45;
      ctx.fillStyle = live ? '#7ef0ff' : '#8fa2c8';
      ctx.fillText((live ? '' : 'LAST   ') + '\u2220 ' + angDeg.toFixed(1) + '\u00b0   V ' + Math.round(spd) + '   THR ' + thr + '%', PAD.x, VH - 4);
      ctx.globalAlpha = 1;
    }
  }
  // pad strobes (danger register)
  for (const [sx2, ph2] of [[PAD.x - 17, 0], [PAD.x + 17, Math.PI]]) {
    ctx.globalAlpha = Math.sin(now * 3 + ph2) > 0.2 ? 0.9 : 0.15;
    ctx.fillStyle = '#ff9d8a';
    ctx.beginPath(); ctx.arc(sx2, 741, 1.4, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // challenger ghost (daily share link): their exact flight in reward gold, with
  // the tag + score to beat pinned under the scoreboard
  if (game.mode === 'daily' && DAILY_GHOST && DAILY_GHOST.path && game.state !== 'dailyEnd') {
    const gp = DAILY_GHOST.path, gn = gp.length / 2;
    ctx.fillStyle = '#ffd166';
    ctx.globalAlpha = 0.22;
    for (let i = 0; i < gn; i += 8) {
      ctx.beginPath(); ctx.arc(gp[i * 2], gp[i * 2 + 1], 2, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 0.85;
    ctx.textAlign = 'center';
    ctx.font = '700 11px Oxanium, -apple-system, sans-serif';
    ctx.fillText('RACING ' + DAILY_GHOST.tag + (DAILY_GHOST.score ? ' · ' + DAILY_GHOST.score : ''), VW / 2, 63);
    ctx.globalAlpha = 1;
  }
  // ghosts of every failed flight on THIS layout — the run's accumulated lessons
  const hereGhosts = game.ghosts.filter(g2 => g2.seed === game.runSeed && g2.depth === game.depth);
  ctx.fillStyle = '#cfe0ff';
  for (let gi = 0; gi < hereGhosts.length; gi++) {
    const gp = hereGhosts[gi].path, gn = gp.length / 2;
    const age = hereGhosts.length - 1 - gi;              // 0 = newest
    ctx.globalAlpha = Math.max(0.18 - age * 0.035, 0.06);
    for (let i = 0; i < gn; i += 8) {
      ctx.beginPath(); ctx.arc(gp[i * 2], gp[i * 2 + 1], 2, 0, 7); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // run over: the proof — dotted winning path + a demo ship flying it into the
  // wormhole on loop, so a lost system ends as a lesson, not a wall
  if (game.state === 'dead' && game.lives <= 0 && game.solDemo) {
    const sd = game.solDemo, sn = sd.path.length / 2;
    ctx.fillStyle = '#e8f0ff';
    ctx.globalAlpha = 0.30;
    for (let i = 4; i < sn; i += 5) {
      ctx.beginPath(); ctx.arc(sd.path[i * 2], sd.path[i * 2 + 1], 2.2, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    const replay = 1.4;                              // demo runs a touch quick
    const flightT = sn * DT / replay;
    const td = ((performance.now() - sd.at) / 1000) % (flightT + 0.9);
    if (td < flightT) {
      const idx = Math.min(Math.floor(td * replay / DT), sn - 2);
      const dx2 = sd.path[idx * 2], dy2 = sd.path[idx * 2 + 1];
      const dAng = Math.atan2(sd.path[idx * 2 + 3] - dy2, sd.path[idx * 2 + 2] - dx2);
      ctx.globalAlpha = Math.min(td / 0.25, 1) * Math.max(Math.min((flightT - td) / 0.15, 1), 0);
      drawShip(dx2, dy2, dAng, true, now);
      ctx.globalAlpha = 1;
    }
  }

  if (game.state === 'aim' && game.preview) {
    // aim line color rises with power: cyan -> white -> gold
    const f = game.previewPower;
    ctx.fillStyle = f < 0.5 ? lerpColor('#7ef0ff', '#ffffff', f * 2) : lerpColor('#ffffff', '#ffd166', (f - 0.5) * 2);
    const n = game.preview.length / 2;
    for (let i = 6; i < n; i += 6) {
      ctx.globalAlpha = 0.85 * (1 - i / n);
      ctx.beginPath();
      ctx.arc(game.preview[i * 2], game.preview[i * 2 + 1], 3, 0, 7);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // hero trail: additive tapering ribbon; lingers and fades ~2s after a death.
  // On a latched DIRECT INSERTION (D-adr-043) the ribbon matures cyan→white→gold
  // toward the ship — the aim power ramp's own language, the one sanctioned
  // player→reward crossover (D-adr-020) — with a white-hot core: the laser line.
  const trailFade = game.state === 'dead' ? Math.max(0, 1 - (performance.now() - game.deadAt) / 2000) : 1;
  if (game.trail.length > 2 && trailFade > 0 && game.state !== 'aim') {
    const insGk = game.insert ? Math.min(Math.max((now - game.gateLockAt) / 0.35, 0), 1) : 0;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = '#7ef0ff';
    ctx.lineCap = 'round';
    const t = game.trail, n = t.length / 2;
    const seg = (i) => {
      ctx.beginPath();
      ctx.moveTo(t[(i - 1) * 2], t[(i - 1) * 2 + 1]);
      ctx.lineTo(t[i * 2], t[i * 2 + 1]);
      ctx.stroke();
    };
    for (let i = 1; i < n; i++) {
      if (insGk > 0) {
        const f = (i / n) * insGk;
        ctx.strokeStyle = f < 0.5 ? lerpColor('#7ef0ff', '#ffffff', f * 2)
                                  : lerpColor('#ffffff', '#ffd166', (f - 0.5) * 2);
      }
      ctx.globalAlpha = 0.55 * (i / n) * trailFade;
      ctx.lineWidth = 0.5 + 3 * (i / n);
      seg(i);
    }
    if (insGk > 0) {
      ctx.strokeStyle = '#ffffff';               // white-hot core inside the gold sheath
      for (let i = 1; i < n; i++) {
        ctx.globalAlpha = 0.35 * (i / n) * insGk * trailFade;
        ctx.lineWidth = (0.5 + 3 * (i / n)) * 0.4;
        seg(i);
      }
      const gwPos = 1 - (now - game.gateLockAt) / 0.4;   // fuse glint: sweeps ship→tail
      if (gwPos > 0) {                                    // at the latch — certainty made visible
        for (let i = 1; i < n; i++) {
          const dw = Math.abs(i / n - gwPos);
          if (dw > 0.08) continue;
          ctx.globalAlpha = 0.9 * (1 - dw / 0.08) * trailFade;
          ctx.lineWidth = (0.5 + 3 * (i / n)) * 1.6;
          seg(i);
        }
      }
    }
    ctx.restore();
  }
  // DIRECT INSERTION golden thread (D-adr-043): the full flown path burns gold for
  // the win window — the solution-reveal ritual in reverse (the game shows losers
  // the answer; this shows the player their own) — with a white-hot bead retracing
  // pad→gate (comet ease). Fades with the win flash; nothing persists (no ghost
  // push, no cross-run leakage — D-adr-014/017 protected).
  if (game.state === 'win' && game.insertThread) {
    const it = game.insertThread, ip = it.path, ipn = ip.length / 2;
    const iAge = (performance.now() - it.at) / 1000;
    // hold full ~1s, then ease out so the fade is underway before the system swap
    const iFade = Math.max(0, Math.min(1, (2.4 - iAge) / 1.4));
    if (iFade > 0 && ipn > 2) {
      ctx.fillStyle = '#ffd166';
      ctx.globalAlpha = 0.45 * iFade;
      for (let i = 4; i < ipn; i += 6) {
        ctx.beginPath(); ctx.arc(ip[i * 2], ip[i * 2 + 1], 1.8, 0, 7); ctx.fill();
      }
      const bu = Math.pow(Math.min(iAge / 0.95, 1), 1.7);
      const bi = Math.min(Math.floor(bu * (ipn - 1)), ipn - 1);
      const bx = ip[bi * 2], by = ip[bi * 2 + 1];
      ctx.globalAlpha = 0.55 * iFade;                       // dark under-halo (P1b)
      ctx.fillStyle = 'rgba(6,9,16,1)';
      ctx.beginPath(); ctx.arc(bx, by, 6.5, 0, 7); ctx.fill();
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.95 * iFade;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(bx, by, 3.5, 0, 7); ctx.fill();
      ctx.globalAlpha = 0.4 * iFade;
      ctx.fillStyle = '#ffd166';
      ctx.beginPath(); ctx.arc(bx, by, 8, 0, 7); ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }
  if (game.state === 'flight') {
    const c = game.craft;
    let ang = Math.atan2(c.vy, c.vx);
    const gA = S.layout.gate;
    const adx = gA.x - c.x, ady = gA.y - c.y;
    const ad = Math.hypot(adx, ady);
    if (game.gateLock) {
      // the turn is trajectory-verified: it only starts when this flight WILL
      // enter the gate — a guaranteed tell, never a tease (no closing-dot test:
      // the lock already proves entry, and hooking approaches shouldn't flicker).
      // Time-ramped so a late latch (curving shots) eases in instead of snapping.
      const ramp = Math.min((now - game.gateLockAt) / 0.35, 1);
      const wgt = Math.max(0, Math.min(1 - (ad - gA.r) / (gA.r * 1.4), 0.9)) * ramp;
      const ta = Math.atan2(ady, adx);
      ang += (((ta - ang + Math.PI * 3) % (Math.PI * 2)) - Math.PI) * wgt;
    }
    // DIRECT INSERTION ignition: cyan→gold over the same 0.35s ease as the nose
    // lean, then a gentle satGold-style breathe — a shimmer, not a strobe
    const goldK = game.insert
      ? Math.min(Math.max((now - game.gateLockAt) / 0.35, 0), 1) * (0.85 + 0.15 * Math.sin(now * 9))
      : 0;
    drawShip(c.x, c.y, ang, true, now, 0, goldK);
  } else if (game.state === 'win' && game.winCraft && !game.winDone) {
    // entry dive: continuous with flight — same velocity at the crossing,
    // steering + acceleration carry it into the throat, fading as it goes
    const g2 = S.layout.gate, w = game.winCraft;
    const d = Math.hypot(g2.x - w.x, g2.y - w.y) || 1;
    const sc = Math.max(0.18, Math.min(d / w.d0, 1));
    ctx.save();
    ctx.globalAlpha = Math.max(Math.min(d / (g2.r * 0.5), 1), 0);
    ctx.translate(w.x, w.y); ctx.scale(sc, sc); ctx.translate(-w.x, -w.y);
    // a golden ship dives golden — the reward visibly flows into the gate (D-adr-021)
    drawShip(w.x, w.y, Math.atan2(w.vy, w.vx), true, now, 0,
             game.insertThread ? 0.85 + 0.15 * Math.sin(now * 9) : 0);
    ctx.restore();
  } else if (game.state === 'aim') {
    const squash = game.drag && game.preview ? 0.04 * game.previewPower : 0;
    drawShip(PAD.x, PAD.y - 11, -Math.PI / 2, false, now, squash);   // rear rests on the platform
  }

  ctx.fillStyle = '#ffb0a0';
  for (const p of game.particles) {
    ctx.globalAlpha = Math.max(p.life / 0.55, 0);
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // (floats + reward FX draw in the final overlay pass — RESEARCH-SCORE-FX P1a)

  // SCOREBOARD — always-on strip across the top (D-adr-020): realtime success
  // indicators. Score left (count-up + punch + gold flash), satellites center
  // (spinning gold bus, pops on every grab), the chase right (BEST + system,
  // gold in fresh territory), best-chase progress bar along the base.
  // The strip lives above y=48; gates never spawn above y=58, so it owns the space.
  const ps = (performance.now() - game.scorePunchAt) / 1000;
  // punch: 1.45x base rising with bank streak (cap 1.7), 0.28s back-out settle
  const pu = Math.min(ps / 0.28, 1);
  const punch = 1 + ((game.punchPeak || 1.45) - 1) * Math.sin(pu * Math.PI) * (1 - 0.35 * pu);
  ctx.fillStyle = 'rgba(6,9,16,0.62)';
  ctx.fillRect(0, 0, VW, 48);
  ctx.textAlign = 'left';
  ctx.font = '600 9px Oxanium, -apple-system, sans-serif';
  ctx.fillStyle = '#8fa2c8';
  ctx.fillText('SCORE', 18, 13);
  ctx.save();
  ctx.translate(18, 39);
  ctx.scale(punch, punch);
  ctx.fillStyle = ps < 0.35 ? lerpColor('#ffd166', '#e8f0ff', ps / 0.35) : '#e8f0ff';
  ctx.font = '800 26px Oxanium, -apple-system, sans-serif';
  ctx.fillText(String(Math.round(game.dispScore * PT)), 0, 0);
  ctx.restore();
  // persistent all-time HIGH score (localStorage gg_best), always on beside SCORE
  // (D-adr-037): gold "NEW HIGH!" the moment this run overtakes it. The daily is
  // its own economy — no HIGH readout there.
  if (!PLAYGROUND && game.mode !== 'daily') {
    const hiBeat = game.bestBeaten;
    ctx.textAlign = 'right';
    ctx.font = '600 9px Oxanium, -apple-system, sans-serif';
    ctx.fillStyle = hiBeat ? '#ffd166' : '#8fa2c8';
    ctx.fillText(hiBeat ? 'NEW HIGH!' : 'HIGH', 184, 13);
    ctx.font = '800 17px Oxanium, -apple-system, sans-serif';
    ctx.fillStyle = hiBeat ? '#ffd166' : '#cdd7ea';
    ctx.fillText(String(best * PT), 184, 33);
    ctx.textAlign = 'left';
  }
  // satellites banked this run
  const sp = (performance.now() - game.satPunchAt) / 1000;
  const satPop = sp < 0.25 ? 1 + 0.5 * Math.sin((sp / 0.25) * Math.PI) : 1;
  ctx.textAlign = 'center';
  ctx.font = '600 9px Oxanium, -apple-system, sans-serif';
  ctx.fillStyle = '#8fa2c8';
  ctx.fillText('SATELLITES', VW / 2, 13);
  ctx.save();
  ctx.translate(VW / 2 - 14, 29);
  ctx.scale(0.8 * satPop, 0.8 * satPop);
  drawSat(0, 0, now * 0.4);
  ctx.restore();
  ctx.save();
  ctx.translate(VW / 2 + 4, 38);
  ctx.scale(satPop, satPop);
  ctx.textAlign = 'left';
  ctx.fillStyle = sp < 0.35 ? '#ffd166' : '#e8f0ff';
  ctx.font = '800 22px Oxanium, -apple-system, sans-serif';
  ctx.fillText(String(game.satsRun), 0, 0);
  ctx.restore();
  // the location: galaxy name, then system name (BEST is now the dedicated HIGH
  // readout beside SCORE — D-adr-037); system name goes gold on a new high
  ctx.textAlign = 'right';
  if (PLAYGROUND) {
    ctx.font = '700 9px Oxanium, -apple-system, sans-serif'; ctx.fillStyle = '#8fa2c8';
    ctx.fillText('PLAYGROUND', VW - 18, 13);
    ctx.font = '800 15px Oxanium, -apple-system, sans-serif'; ctx.fillStyle = '#e8f0ff';
    ctx.fillText('SANDBOX', VW - 18, 32);
  } else if (game.mode === 'daily') {
    ctx.font = '700 9px Oxanium, -apple-system, sans-serif'; ctx.fillStyle = '#ffd166';
    ctx.fillText("TODAY'S SYSTEM", VW - 18, 14);
    ctx.font = '800 15px Oxanium, -apple-system, sans-serif'; ctx.fillStyle = '#e8f0ff';
    ctx.fillText(sysName(game.depth).system.toUpperCase(), VW - 18, 33);
  } else {
    const nm = sysName(game.depth);
    ctx.font = '700 9px Oxanium, -apple-system, sans-serif'; ctx.fillStyle = '#8fa2c8';
    ctx.fillText(nm.galaxy.toUpperCase(), VW - 18, 14);
    ctx.font = '800 15px Oxanium, -apple-system, sans-serif'; ctx.fillStyle = game.bestBeaten ? '#ffd166' : '#e8f0ff';
    ctx.fillText(nm.system.toUpperCase(), VW - 18, 33);
  }
  // (zips draw in the final overlay pass)
  // best-chase bar: cyan filling toward gold — same language as the aim ramp
  if (!PLAYGROUND && game.mode !== 'daily') {
    const target = best > 0 ? best : 5;
    ctx.fillStyle = 'rgba(143,162,200,0.18)';
    ctx.fillRect(0, 46, VW, 2.5);
    if (game.bestBeaten) {
      ctx.globalAlpha = 0.75 + 0.25 * Math.sin(now * 3);
      ctx.fillStyle = '#ffd166';
      ctx.fillRect(0, 46, VW, 2.5);
      ctx.globalAlpha = 1;
    } else {
      const bfrac = Math.min(game.score / target, 1);
      ctx.fillStyle = bfrac < 0.99 ? '#7ef0ff' : '#ffd166';
      ctx.fillRect(0, 46, VW * bfrac, 2.5);
    }
    // chained secondary: the bar flashes gold when a reward banks
    const bf = (performance.now() - (game.barFlashAt || -1e9)) / 1000;
    if (bf < 0.25) {
      ctx.globalAlpha = 0.8 * (1 - bf / 0.25);
      ctx.fillStyle = '#ffd166';
      ctx.fillRect(0, 46, VW, 2.5);
      ctx.globalAlpha = 1;
    }
  }
  // BEST-chase countdown chip: shows in striking distance (~70% of BEST) and
  // amber-pulses within ~one boosted escape of the record — near-miss surfacing
  // tuned to fire on decent runs (D-adr-026, RESEARCH-SCORING §1.6). Replaces the
  // per-system tip while it's up (a live record chase beats a static hint).
  game.chaseChipShown = false;
  if (!PLAYGROUND && game.mode !== 'daily' && best > 0 && !game.bestBeaten && game.score >= 0.7 * best
      && game.score < best && (game.state === 'aim' || game.state === 'flight')) {
    const delta = (best - game.score) * PT;
    const near = (best - game.score) <= SCORE.ESCAPE_BASE * game.depth * 3;
    ctx.textAlign = 'center';
    ctx.font = '800 13px Oxanium, -apple-system, sans-serif';
    ctx.globalAlpha = near ? (0.7 + 0.3 * Math.sin(now * 6)) : 0.85;
    ctx.fillStyle = near ? '#ffd166' : '#7ef0ff';
    ctx.fillText('HIGH  −' + delta, VW / 2, 63);
    ctx.globalAlpha = 1;
    game.chaseChipShown = true;
  }
  // the hangar: remaining ships, bottom-left
  // earned ships in transit (lifeZips) don't dock until their comet arrives (D-adr-042)
  const nShips = Math.max(Math.min(game.lives, MAX_LIVES) - game.lifeZips.length, 0);
  // NB: now is SECONDS in draw(); lifePunchAt is performance.now() ms — use ms here
  const lifePulse = Math.max(0, 1 - (performance.now() - (game.lifePunchAt || -1e9)) / 450);  // 0..1 fade after a ship docks
  for (let i = 0; i < nShips; i++) {
    const lx = 26 + i * 18, ly = VH - 54;
    const pop = i === nShips - 1 ? 1 + 0.5 * lifePulse : 1;   // the freshly-docked pip pops
    ctx.save();
    ctx.globalAlpha = 0.9 + 0.1 * (i === nShips - 1 ? lifePulse : 0);
    ctx.translate(lx, ly); ctx.scale(0.4 * pop, 0.4 * pop); ctx.translate(-lx, -ly);
    drawShip(lx, ly, -Math.PI / 2, false, now);
    ctx.restore();
  }
  if (lifePulse > 0 && nShips > 0) {             // docking ring around the newest pip
    const rx = 26 + (nShips - 1) * 18, ry = VH - 54;
    ctx.strokeStyle = 'rgba(6,9,16,0.5)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(rx, ry, 6 + (1 - lifePulse) * 16, 0, 7); ctx.stroke();
    ctx.strokeStyle = 'rgba(126,240,255,' + (0.85 * lifePulse).toFixed(3) + ')'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(rx, ry, 6 + (1 - lifePulse) * 16, 0, 7); ctx.stroke();
  }
  // base progress: the persistent goal that travels with you (hidden while STATION_ON=false)
  ctx.textAlign = 'center';
  if (STATION_ON) {
    const nParts = partsUnlocked(career);
    const nextPart = STATION_STAGES.find(p => career < p.at);
    const prevAt = nParts > 0 ? STATION_STAGES[nParts - 1].at : 0;
    const frac = nextPart ? (career - prevAt) / (nextPart.at - prevAt) : 1;
    ctx.font = '600 10px Oxanium, -apple-system, sans-serif';
    ctx.fillStyle = '#8fa2c8';
    ctx.fillText('STATION ' + nParts + '/' + STATION_STAGES.length, VW / 2, VH - 26);
    ctx.fillStyle = 'rgba(143,162,200,0.25)';
    ctx.fillRect(VW / 2 - 40, VH - 20, 80, 4);
    ctx.fillStyle = '#ffd166';
    ctx.fillRect(VW / 2 - 40, VH - 20, 80 * Math.min(frac, 1), 4);
  }

  // one tip per system, top of the sky (stable across retries of the system).
  // A racing chip owns that line in the daily (D-adr-046) — the chip wins.
  if (game.state === 'aim' && !game.chaseChipShown && !(game.mode === 'daily' && DAILY_GHOST)) {
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#8fa2c8';
    ctx.font = '600 12px Oxanium, -apple-system, sans-serif';
    ctx.fillText(TIPS[(game.depth * 31 + (game.runSeed & 1023)) % TIPS.length], VW / 2, 64);
    ctx.globalAlpha = 1;
  }

  ctx.font = '600 15px Oxanium, -apple-system, sans-serif';
  if (game.state === 'aim' && !game.hintsDone) {
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = '#8fa2c8';
    ctx.fillText('drag anywhere to aim — release to fling', VW / 2, game.hintY);
    ctx.fillText('graze planets = bonus · grab satellites · avoid moons', VW / 2, game.hintY + 22);
    ctx.globalAlpha = 1;
  } else if (game.state === 'dead' && game.lives > 0) {
    // mission failed but ships remain: compact retry screen, ghost is on the field
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff9d8a';
    ctx.font = '800 30px Oxanium, -apple-system, sans-serif';
    ctx.fillText(game.deadMsg, VW / 2, VH / 2 - 40);
    ctx.font = '600 15px Oxanium, -apple-system, sans-serif';
    ctx.fillStyle = '#8fa2c8';
    ctx.fillText(game.lives + ' ship' + (game.lives === 1 ? '' : 's') + ' left · your last path is marked', VW / 2, VH / 2 - 10);
    if (game.satsThisFlight > 0) {
      ctx.fillStyle = '#ffd166';
      ctx.fillText('+' + game.satsThisFlight + ' satellite' + (game.satsThisFlight === 1 ? '' : 's') + ' banked' + (STATION_ON ? ' to the station' : ''), VW / 2, VH / 2 + 14);
    }
    if (game.grazesThisFlight > 0) {
      ctx.fillStyle = '#ffd166';
      ctx.fillText('+' + game.grazesThisFlight + ' slingshot' + (game.grazesThisFlight === 1 ? '' : 's') + ' banked', VW / 2, VH / 2 + (game.satsThisFlight > 0 ? 36 : 14));
    }
    if (performance.now() - game.deadAt > 350) {
      ctx.globalAlpha = 0.55 + 0.3 * Math.sin(now * 4);
      ctx.fillStyle = '#e8f0ff';
      ctx.fillText('tap to retry', VW / 2, VH * 0.72);
      ctx.globalAlpha = 1;
    }
  } else if (game.state === 'dead') {
    // hangar empty: full run-over screen (the base render is gated on STATION_ON)
    ctx.textAlign = 'center';
    if (STATION_ON) {
      const nextPart = STATION_STAGES.find(p => career < p.at);
      drawStation(ctx, VW / 2, VH * 0.27, 1.8, partsUnlocked(career), now);
      if (game.partUnlocked) {
        ctx.fillStyle = '#ffd166';
        ctx.font = '800 18px Oxanium, -apple-system, sans-serif';
        ctx.fillText('NEW PART: ' + game.partUnlocked, VW / 2, VH * 0.27 + 52);
      } else {
        ctx.fillStyle = '#8fa2c8';
        ctx.font = '600 12px Oxanium, -apple-system, sans-serif';
        ctx.fillText(nextPart ? (nextPart.at - career) * PT + ' pts to ' + nextPart.name : 'BASE COMPLETE', VW / 2, VH * 0.27 + 52);
      }
    }
    ctx.fillStyle = '#ff9d8a';
    ctx.font = '800 30px Oxanium, -apple-system, sans-serif';
    ctx.fillText('OUT OF SHIPS', VW / 2, VH / 2 - 40);
    if (game.bestBeaten) {
      ctx.fillStyle = '#ffd166';
      ctx.font = '800 22px Oxanium, -apple-system, sans-serif';
      ctx.fillText('NEW HIGH!', VW / 2, VH / 2 - 6);
    }
    // itemized end-of-run tally (pinball end-of-ball receipt, D-adr-026): show
    // where the run's score came from, then the TOTAL and the record.
    let ty = VH / 2 + 14;
    ctx.font = '600 13px Oxanium, -apple-system, sans-serif';
    const rows = [
      ['SATELLITES', game.satsRun + ' × 50 = ' + (game.satsRun * SCORE.SAT * PT)],
      ['BEST CHAIN', '+' + (game.bestChainVal * PT)],
      ['DEEPEST SYSTEM', String(game.deepestSys)],
    ];
    // itemize-never-lump (D-adr-026): insertions get a receipt line only when earned
    if (game.insertsRun) rows.splice(2, 0, ['DIRECT INSERTIONS', '×' + game.insertsRun]);
    rows.forEach((r, i) => {
      ctx.textAlign = 'right'; ctx.fillStyle = '#8fa2c8';
      ctx.fillText(r[0], VW / 2 - 8, ty + i * 17);
      ctx.textAlign = 'left'; ctx.fillStyle = '#cdd8ee';
      ctx.fillText(r[1], VW / 2 + 8, ty + i * 17);
    });
    ctx.textAlign = 'center';
    ty += rows.length * 17 + 12;
    ctx.font = '800 19px Oxanium, -apple-system, sans-serif';
    ctx.fillStyle = game.bestBeaten ? '#ffd166' : '#e8f0ff';
    ctx.fillText('RUN  ' + game.score * PT + '   ·   HIGH  ' + best * PT, VW / 2, ty);
    if (game.solDemo) {
      // the winning shot's numbers, player-cyan: this is a flyable instruction
      const sspd = Math.hypot(game.solDemo.vx, game.solDemo.vy);
      const sang = (Math.atan2(-game.solDemo.vy, game.solDemo.vx) * 180 / Math.PI + 360) % 360;
      const sthr = Math.round(Math.min((sspd - MIN_V) / (MAX_V - MIN_V), 1) * 100);
      ctx.fillStyle = '#7ef0ff';
      ctx.font = '600 13px Oxanium, -apple-system, sans-serif';
      ctx.fillText('THE SHOT   ∠ ' + sang.toFixed(1) + '° · V ' + Math.round(sspd) + ' · THR ' + sthr + '%', VW / 2, ty + 28);
      ctx.font = '600 11px Oxanium, -apple-system, sans-serif';
      ctx.fillStyle = '#8fa2c8';
      ctx.fillText('it was makeable — watch the marked flight', VW / 2, ty + 46);
    }
    if (performance.now() - game.deadAt > 350) {
      ctx.globalAlpha = 0.55 + 0.3 * Math.sin(now * 4);
      ctx.fillStyle = '#e8f0ff';
      ctx.font = '600 15px Oxanium, -apple-system, sans-serif';
      ctx.fillText(game.mode === 'daily' ? "tap for today's result" : 'tap for new run', VW / 2, VH * 0.72);
      ctx.globalAlpha = 1;
    }
    // GALAXY MAP (D-adr-047): the lifetime progress record — 11 tiles, objective
    // pips, gold DONE fills. The long game is completing all 11.
    if (OBJ.ON && game.mode !== 'daily') {
      const mapY = VH * 0.78;
      ctx.font = '600 10px Oxanium, -apple-system, sans-serif';
      ctx.fillStyle = '#8fa2c8';
      ctx.fillText('GALAXY MAP  ·  ' + galaxiesDone() + '/11 COMPLETE', VW / 2, mapY);
      const tw = 32, gap = 6, x0 = (VW - (11 * (tw + gap) - gap)) / 2;
      for (let gi = 0; gi < 11; gi++) {
        const tx2 = x0 + gi * (tw + gap), ty2 = mapY + 10;
        const done = galaxyDone(gi);
        if (done) {
          ctx.fillStyle = '#ffd166';
          ctx.fillRect(tx2, ty2, tw, 20);
          ctx.fillStyle = '#070b14';
        } else {
          ctx.strokeStyle = 'rgba(143,162,200,0.5)'; ctx.lineWidth = 1;
          ctx.strokeRect(tx2, ty2, tw, 20);
          ctx.fillStyle = gi === GALAXIES.indexOf(galaxyFor(game.depth)) ? '#e8f0ff' : '#8fa2c8';
        }
        ctx.font = '700 11px Oxanium, -apple-system, sans-serif';
        ctx.fillText(String(gi + 1), tx2 + tw / 2, ty2 + 14);
        for (let i = 0; i < objOffered(); i++) {   // objective pips under each tile
          ctx.fillStyle = (objMask[gi] >> i) & 1 ? '#ffd166' : 'rgba(143,162,200,0.35)';
          ctx.beginPath(); ctx.arc(tx2 + tw / 2 + (i - 1) * 8, ty2 + 27, 2, 0, 7); ctx.fill();
        }
      }
    }
  }

  // TODAY'S SYSTEM result panel (D-adr-046): result, tag entry, the board, actions
  if (game.state === 'dailyEnd') {
    const et = Math.min((performance.now() - game.dailyEndAt) / 300, 1);
    dimScreen(et);
    panelBox(VW / 2, VH * 0.47, VW - 40, 560, et);
    ctx.globalAlpha = et;
    ctx.textAlign = 'center';
    const MON = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
    const dayTxt = MON[+DAILY.day.slice(4, 6) - 1] + ' ' + (+DAILY.day.slice(6));
    ctx.fillStyle = '#ffd166';
    ctx.font = '700 12px Oxanium, -apple-system, sans-serif';
    ctx.fillText("TODAY'S SYSTEM", VW / 2, 140);
    ctx.fillStyle = '#8fa2c8';
    ctx.font = '600 13px Oxanium, -apple-system, sans-serif';
    ctx.fillText(dayTxt + ' · ' + sysName(DAILY.depth).system.toUpperCase(), VW / 2, 162);
    if (game.dailyEscaped) {
      ctx.fillStyle = '#ffd166';
      ctx.font = '800 32px Oxanium, -apple-system, sans-serif';
      ctx.fillText(String(Math.round(game.dailyResult * PT)), VW / 2, 216);
      ctx.fillStyle = '#8fa2c8';
      ctx.font = '600 11px Oxanium, -apple-system, sans-serif';
      ctx.fillText('ESCAPED · SHIPS USED ' + game.dailyTries + '/' + DAILY_LIVES, VW / 2, 238);
    } else {
      ctx.fillStyle = '#ff9d8a';
      ctx.font = '800 22px Oxanium, -apple-system, sans-serif';
      ctx.fillText('NO ESCAPE TODAY', VW / 2, 212);
      ctx.fillStyle = '#8fa2c8';
      ctx.font = '600 11px Oxanium, -apple-system, sans-serif';
      ctx.fillText('same system all day — try again', VW / 2, 234);
    }
    if (game.dailyEscaped && !game.dailySubmitted) {
      // 3-wheel arcade tag: tap a letter to cycle
      ctx.fillStyle = '#8fa2c8';
      ctx.font = '600 10px Oxanium, -apple-system, sans-serif';
      ctx.fillText('YOUR TAG — TAP TO CYCLE', VW / 2, 290);
      for (let i = 0; i < 3; i++) {
        const r = DUI.tag[i];
        ctx.fillStyle = 'rgba(126,240,255,0.08)';
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.strokeStyle = 'rgba(126,240,255,0.6)'; ctx.lineWidth = 1.5;
        ctx.strokeRect(r.x, r.y, r.w, r.h);
        ctx.fillStyle = '#e8f0ff';
        ctx.font = '800 26px Oxanium, -apple-system, sans-serif';
        ctx.fillText(game.dailyTag[i], r.x + r.w / 2, r.y + 32);
      }
      const sb = DUI.submit;
      ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 2;
      ctx.strokeRect(sb.x, sb.y, sb.w, sb.h);
      ctx.fillStyle = '#ffd166';
      ctx.font = '700 15px Oxanium, -apple-system, sans-serif';
      ctx.fillText('POST SCORE', VW / 2, sb.y + 26);
    } else {
      ctx.fillStyle = '#8fa2c8';
      ctx.font = '600 10px Oxanium, -apple-system, sans-serif';
      ctx.fillText("TODAY'S BOARD", VW / 2, 290);
      const b = game.dailyBoard;
      if (!b) {
        ctx.font = '600 12px Oxanium, -apple-system, sans-serif';
        ctx.fillText('FETCHING…', VW / 2, 330);
      } else if (b.error) {
        ctx.font = '600 12px Oxanium, -apple-system, sans-serif';
        ctx.fillText('BOARD UNREACHABLE — SCORE KEPT LOCALLY', VW / 2, 330);
      } else {
        const myTag = game.dailyTag.join('');
        const rows2 = (b.top || []).slice(0, 8);
        ctx.font = '700 14px Oxanium, -apple-system, sans-serif';
        if (!rows2.length) ctx.fillText('NO ESCAPES POSTED YET — BE FIRST', VW / 2, 330);
        rows2.forEach((r, i) => {
          const y2 = 316 + i * 22;
          const mine = game.dailySubmitted && r.tag === myTag;
          ctx.fillStyle = mine ? '#ffd166' : (i === 0 ? '#e8f0ff' : '#cdd8ee');
          ctx.textAlign = 'right'; ctx.fillText(String(i + 1), VW / 2 - 70, y2);
          ctx.textAlign = 'left'; ctx.fillText(r.tag, VW / 2 - 48, y2);
          ctx.textAlign = 'right'; ctx.fillText(String(r.score), VW / 2 + 90, y2);
        });
        ctx.textAlign = 'center';
        if (game.dailySubmitted && b.rank)
          ctx.fillStyle = '#ffd166', ctx.font = '700 12px Oxanium, -apple-system, sans-serif',
          ctx.fillText('YOUR RANK ' + b.rank + ' OF ' + b.count, VW / 2, 316 + rows2.length * 22 + 20);
      }
    }
    // actions
    const drawBtn = (r, label, color) => {
      ctx.strokeStyle = color; ctx.lineWidth = 1.5;
      ctx.strokeRect(r.x, r.y, r.w, r.h);
      ctx.fillStyle = color;
      ctx.font = '700 13px Oxanium, -apple-system, sans-serif';
      ctx.fillText(label, r.x + r.w / 2, r.y + 26);
    };
    if (game.dailyEscaped) drawBtn(DUI.share, 'SHARE', '#7ef0ff');
    drawBtn(DUI.again, 'PLAY AGAIN', '#ffd166');
    drawBtn(DUI.exit, 'EXIT', '#8fa2c8');
    ctx.globalAlpha = 1;
  }

  // first-run how-to-play: one readable page over a dimmed field, tap to start
  if (game.state === 'intro') {
    dimScreen(1);
    const cy = VH * 0.47;
    panelBox(VW / 2, cy, VW - 32, 588, 1);
    ctx.textAlign = 'center';
    let y = cy - 258;
    ctx.fillStyle = '#7ef0ff';
    ctx.font = '800 40px Oxanium, -apple-system, sans-serif';
    ctx.fillText('GRAVITY ASSIST', VW / 2, y); y += 30;
    ctx.fillStyle = '#8fa2c8';
    ctx.font = '600 16px Oxanium, -apple-system, sans-serif';
    ctx.fillText('one fling. slingshot the stars. escape.', VW / 2, y);
    const rows = [
      ['DRAG & RELEASE', 'anywhere to aim — the line shows your path,', 'longer drag = more power'],
      ['REACH THE WORMHOLE', 'thread the spiral gate to escape the system', ''],
      ['SLINGSHOT PLANETS', 'skim close for +' + PT + ' each — the reward', 'flies to your score'],
      ['GRAB SATELLITES', 'the gold ' + '✦' + ' banks +' + PT + ', collect them all', ''],
      ['DODGE MOONS', 'grey moons orbit non-stop — time your gap', ''],
      ['5 SHIPS PER RUN', 'crash and retry the same system;', 'your last path stays as a guide'],
    ];
    // even reading rhythm: the BLANK gap after each block is constant, so
    // one- and two-line blocks sit apart by the same amount (laid out
    // sequentially, not on a fixed head step — 2-line blocks are taller)
    ctx.textAlign = 'left';
    const lx = 40, GAP = 41;
    let ry = cy - 186;
    rows.forEach(([head, l1, l2]) => {
      ctx.fillStyle = '#ffd166';
      ctx.font = '700 18px Oxanium, -apple-system, sans-serif';
      ctx.fillText(head, lx, ry);
      ctx.fillStyle = '#cdd8ee';
      ctx.font = '600 15px Oxanium, -apple-system, sans-serif';
      ctx.fillText(l1, lx, ry + 23);
      if (l2) ctx.fillText(l2, lx, ry + 43);
      ry += 23 + (l2 ? 20 : 0) + GAP;      // advance past this block's body, then the fixed gap
    });
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.5 + 0.35 * Math.sin(now * 4);
    ctx.fillStyle = '#e8f0ff';
    ctx.font = '700 19px Oxanium, -apple-system, sans-serif';
    ctx.fillText('tap to launch', VW / 2, cy + 262);
    ctx.globalAlpha = 1;
    // TODAY'S SYSTEM entry (D-adr-046): one shared date-seeded system, 3 ships
    const db = DUI.introDaily;
    ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 1.5;
    ctx.strokeRect(db.x, db.y, db.w, db.h);
    ctx.fillStyle = '#ffd166';
    ctx.font = '700 15px Oxanium, -apple-system, sans-serif';
    ctx.fillText("◈  TODAY'S SYSTEM", VW / 2, db.y + 28);
  }

  // galaxy-transition splash: name the place, show the station taking shape
  if (game.state === 'splash') {
    const st = (performance.now() - game.splashAt) / 1000;
    const fadeIn = Math.min(st / 0.3, 1);
    dimScreen(fadeIn);                               // dim the play behind (D-adr-024)
    // panel shrinks when the station block is hidden so the splash stays compact;
    // the objectives list (D-adr-047) borrows the extra height instead
    const splashObj = OBJ.ON && !STATION_ON && game.mode !== 'daily';
    if (STATION_ON) panelBox(VW / 2, VH * 0.5, VW - 48, VH * 0.62, fadeIn);
    else if (splashObj) panelBox(VW / 2, VH * 0.35, VW - 48, VH * 0.51, fadeIn);
    else panelBox(VW / 2, VH * 0.30, VW - 48, VH * 0.34, fadeIn);
    ctx.globalAlpha = fadeIn;
    ctx.textAlign = 'center';
    // every 3 systems you enter a new GALAXY (the world changes); systems 2-3 are
    // deeper stops within the same galaxy
    const newGalaxy = (game.depth - 1) % 3 === 0;
    const _nm = sysName(game.depth);
    ctx.fillStyle = '#8fa2c8';
    ctx.font = '600 12px Oxanium, -apple-system, sans-serif';
    ctx.fillText(newGalaxy && game.depth > 1 ? 'ENTERING GALAXY' : 'ENTERING', VW / 2, VH * 0.26 - 34);
    ctx.fillStyle = '#e8f0ff';
    ctx.font = '800 30px Oxanium, -apple-system, sans-serif';
    ctx.fillText(_nm.galaxy.toUpperCase(), VW / 2, VH * 0.26);
    ctx.fillStyle = '#8fa2c8';
    ctx.font = '600 13px Oxanium, -apple-system, sans-serif';
    ctx.fillText(galaxy.mood, VW / 2, VH * 0.26 + 24);
    ctx.fillStyle = '#e8f0ff'; ctx.font = '800 15px Oxanium, -apple-system, sans-serif';
    ctx.fillText(_nm.system.toUpperCase(), VW / 2, VH * 0.26 + 46);
    ctx.fillStyle = '#8fa2c8'; ctx.font = '600 11px Oxanium, -apple-system, sans-serif';
    ctx.fillText('SYSTEM ' + (((game.depth - 1) % 3) + 1) + ' OF 3', VW / 2, VH * 0.26 + 62);
    // this galaxy's objectives (D-adr-047): pips fill lifetime, any lap
    if (splashObj) {
      const ogi2 = GALAXIES.indexOf(galaxy);
      const nOff = objOffered();
      let oy = VH * 0.26 + 102;
      ctx.textAlign = 'left';
      for (let i = 0; i < nOff; i++) {
        const o = OBJECTIVES[ogi2][i];
        const done = (objMask[ogi2] >> i) & 1;
        const star = OBJ.SPOTLIGHT && objSpotlight(ogi2) === i ? '★ ' : '';
        ctx.font = '700 16px Oxanium, -apple-system, sans-serif';
        ctx.fillStyle = done ? '#ffd166' : '#e8f0ff';
        ctx.fillText((done ? '✔ ' : '○ ') + star + o.n, 48, oy);
        ctx.font = '600 13px Oxanium, -apple-system, sans-serif';
        ctx.fillStyle = '#8fa2c8';
        ctx.fillText(o.d, 76, oy + 19);
        oy += 46;
      }
      ctx.textAlign = 'center';
      ctx.font = '600 12px Oxanium, -apple-system, sans-serif';
      ctx.fillStyle = galaxyDone(ogi2) ? '#ffd166' : '#8fa2c8';
      ctx.fillText((galaxyDone(ogi2) ? 'GALAXY COMPLETE · ' : '') + 'GALAXIES ' + galaxiesDone() + '/11', VW / 2, oy + 8);
    }
    // the station so far (hidden while STATION_ON=false)
    if (STATION_ON) {
      const spN = partsUnlocked(career);
      const spNext = STATION_STAGES.find(p => career < p.at);
      drawStation(ctx, VW / 2, VH * 0.52, 2.2, spN, now);
      ctx.fillStyle = '#8fa2c8';
      ctx.font = '600 12px Oxanium, -apple-system, sans-serif';
      ctx.fillText('STATION  ' + spN + '/' + STATION_STAGES.length, VW / 2, VH * 0.52 + 64);
      const spPrev = spN > 0 ? STATION_STAGES[spN - 1].at : 0;
      const spFrac = spNext ? (career - spPrev) / (spNext.at - spPrev) : 1;
      ctx.fillStyle = 'rgba(143,162,200,0.25)';
      ctx.fillRect(VW / 2 - 60, VH * 0.52 + 74, 120, 4);
      ctx.fillStyle = '#ffd166';
      ctx.fillRect(VW / 2 - 60, VH * 0.52 + 74, 120 * Math.min(spFrac, 1), 4);
      if (spNext) {
        ctx.fillStyle = '#8fa2c8';
        ctx.font = '600 11px Oxanium, -apple-system, sans-serif';
        ctx.fillText((spNext.at - career) * PT + ' pts to ' + spNext.name, VW / 2, VH * 0.52 + 96);
      }
    }
    if (st > 0.4) {
      ctx.globalAlpha = fadeIn * (0.5 + 0.3 * Math.sin(now * 4));
      ctx.fillStyle = '#e8f0ff';
      ctx.font = '600 14px Oxanium, -apple-system, sans-serif';
      ctx.fillText('tap to continue', VW / 2, STATION_ON ? VH * 0.78 : (splashObj ? VH * 0.645 : VH * 0.44));
    }
    ctx.globalAlpha = 1;
  }

  // ---------- reward-FX overlay: ALWAYS the topmost pixels (P1a) ----------
  // dark under-halos keep gold readable over planets and the scoreboard (P1b)
  const halo = (x, y, r) => {
    ctx.fillStyle = 'rgba(6,9,16,0.55)';
    ctx.beginPath(); ctx.arc(x, y, r + 3, 0, 7); ctx.fill();
  };
  // DIRECT INSERTION entry: collapse rings in the wormhole's OWN violet family
  // (WORMHOLE-RESEARCH candidate #5, earmarked as a win-moment effect) — three
  // rings contract onto the exact win radius; no new gold touches the gate.
  if (game.insertRings) {
    const irt = (performance.now() - game.insertRings.at) / 1000;
    if (irt > 1.05) game.insertRings = null;
    else {
      const gI = game.sys.layout.gate;
      for (let k = 0; k < 3; k++) {
        const u = (irt - k * 0.13) / 0.65;
        if (u < 0 || u > 1) continue;
        const rr = (2.2 - k * 0.45) * gI.r * (1 - u) + gI.r * u;
        ctx.strokeStyle = 'rgba(6,9,16,' + (0.5 * (1 - u)).toFixed(3) + ')'; ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.arc(gI.x, gI.y, rr + 1.5, 0, 7); ctx.stroke();
        ctx.strokeStyle = 'rgba(138,108,240,' + (0.8 * (1 - u)).toFixed(3) + ')'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(gI.x, gI.y, rr, 0, 7); ctx.stroke();
        ctx.fillStyle = 'rgba(230,220,255,' + (0.7 * (1 - u)).toFixed(3) + ')';   // spark tips
        for (let s2 = 0; s2 < 4; s2++) {
          const sa = s2 * Math.PI / 2 + k * 0.5 + u * 0.6;
          ctx.beginPath(); ctx.arc(gI.x + Math.cos(sa) * rr, gI.y + Math.sin(sa) * rr, 1.5, 0, 7); ctx.fill();
        }
      }
    }
  }
  for (const z of game.zips) {
    const age = (performance.now() - z.t0) / 1000;
    if (age < 0) continue;                       // queued behind an earlier zip
    if (age < z.hold) {                          // phase A: pop & hold (admire pause)
      const t = age / z.hold;
      const s = t < 0.4 ? 1.35 * (t / 0.4) : 1.35 - 0.35 * ((t - 0.4) / 0.6);
      for (const d of [0, 0.1]) {                // double burst ring
        if (age < d) continue;
        const rt = Math.min((age - d) / (z.hold - d), 1);
        ctx.strokeStyle = 'rgba(6,9,16,0.5)'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(z.x0, z.y0, 5 + rt * 23, 0, 7); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,209,102,' + (0.65 * (1 - rt)).toFixed(3) + ')'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(z.x0, z.y0, 5 + rt * 23, 0, 7); ctx.stroke();
      }
      if (age < 0.3) {                           // radial gold sparks
        ctx.fillStyle = 'rgba(255,209,102,' + (0.8 * (1 - age / 0.3)).toFixed(3) + ')';
        for (let k = 0; k < 9; k++) {
          const a2 = (k / 9) * Math.PI * 2 + z.seed;
          const sp2 = 40 + ((z.seed * (k + 3)) % 50);
          ctx.beginPath();
          ctx.arc(z.x0 + Math.cos(a2) * sp2 * age, z.y0 + Math.sin(a2) * sp2 * age, 2, 0, 7);
          ctx.fill();
        }
      }
      halo(z.x0, z.y0, 7 * s);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = '#ffd166';
      ctx.globalAlpha = 0.35;                    // soft glow
      ctx.beginPath(); ctx.arc(z.x0, z.y0, 14 * s, 0, 7); ctx.fill();
      ctx.globalAlpha = 0.95;                    // core
      ctx.beginPath(); ctx.arc(z.x0, z.y0, 7 * s, 0, 7); ctx.fill();
      ctx.restore();
    } else {                                     // phase B: travel — the zoom
      const u = Math.pow(Math.min((age - z.hold) / z.dur, 1), 2.2);
      const tx = 34, ty = 31;                    // the SCORE number
      const mx = (z.x0 + tx) / 2 + z.bend, my = (z.y0 + ty) / 2;
      const bez = (a, b, cc, q) => (1 - q) * (1 - q) * a + 2 * (1 - q) * q * b + q * q * cc;
      const hs = 7 * (1 - 0.4 * u);              // head shrinks toward the tile
      for (let k = 8; k >= 0; k--) {             // head + 8-segment tail
        const q = Math.max(u - k * 0.04, 0);
        const px = bez(z.x0, mx, tx, q), py = bez(z.y0, my, ty, q);
        const r = k === 0 ? hs : Math.max(hs * 0.55 - k * 0.25, 1);
        halo(px, py, r);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = k === 0 ? 0.95 : Math.max(0.5 - k * 0.055, 0.05);
        ctx.fillStyle = '#ffd166';
        ctx.beginPath(); ctx.arc(px, py, r, 0, 7); ctx.fill();
        ctx.restore();
      }
    }
  }
  // earned-ship comet: cyan pop at the 4th sat, then a bezier dive to the hangar (D-adr-042)
  for (const z of game.lifeZips) {
    const age = (performance.now() - z.t0) / 1000;
    if (age < 0) continue;
    if (age < z.hold) {                          // phase A: cyan pop & hold
      const t = age / z.hold;
      const s = t < 0.4 ? 1.4 * (t / 0.4) : 1.4 - 0.4 * ((t - 0.4) / 0.6);
      const rt = Math.min(age / z.hold, 1);
      ctx.strokeStyle = 'rgba(6,9,16,0.5)'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(z.x0, z.y0, 6 + rt * 26, 0, 7); ctx.stroke();
      ctx.strokeStyle = 'rgba(126,240,255,' + (0.7 * (1 - rt)).toFixed(3) + ')'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(z.x0, z.y0, 6 + rt * 26, 0, 7); ctx.stroke();
      halo(z.x0, z.y0, 8 * s);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = '#7ef0ff';
      ctx.globalAlpha = 0.35;
      ctx.beginPath(); ctx.arc(z.x0, z.y0, 15 * s, 0, 7); ctx.fill();
      ctx.globalAlpha = 0.95;
      ctx.beginPath(); ctx.arc(z.x0, z.y0, 8 * s, 0, 7); ctx.fill();
      ctx.restore();
    } else {                                     // phase B: travel to the hangar pip
      const u = Math.pow(Math.min((age - z.hold) / z.dur, 1), 2.2);
      const mx = (z.x0 + z.tx) / 2 + z.bend, my = (z.y0 + z.ty) / 2;
      const bez = (a, b, cc, q) => (1 - q) * (1 - q) * a + 2 * (1 - q) * q * b + q * q * cc;
      const hs = 7 * (1 - 0.35 * u);
      for (let k = 8; k >= 0; k--) {             // head + 8-segment tail
        const q = Math.max(u - k * 0.04, 0);
        const px = bez(z.x0, mx, z.tx, q), py = bez(z.y0, my, z.ty, q);
        const r = k === 0 ? hs : Math.max(hs * 0.55 - k * 0.25, 1);
        halo(px, py, r);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = k === 0 ? 0.95 : Math.max(0.5 - k * 0.055, 0.05);
        ctx.fillStyle = '#7ef0ff';
        ctx.beginPath(); ctx.arc(px, py, r, 0, 7); ctx.fill();
        ctx.restore();
      }
    }
  }
  // landing ring on the SCORE tile (impact confirmation, phase C)
  const lr = (performance.now() - (game.landRingAt || -1e9)) / 1000;
  if (lr < 0.2) {
    ctx.strokeStyle = 'rgba(6,9,16,0.5)'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(34, 31, 2 + (lr / 0.2) * 14, 0, 7); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,209,102,' + (0.9 * (1 - lr / 0.2)).toFixed(3) + ')'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(34, 31, 2 + (lr / 0.2) * 14, 0, 7); ctx.stroke();
  }
  // floats last — reward text over everything, dark-outlined (Balatro halo rule)
  ctx.textAlign = 'center';
  ctx.lineJoin = 'round';
  for (const f of game.floats) {
    if (f.delay > 0) continue;                       // not yet revealed
    ctx.globalAlpha = Math.min(f.life / 0.4, 1);
    ctx.font = '800 ' + f.size + 'px Oxanium, -apple-system, sans-serif';
    ctx.strokeStyle = 'rgba(6,9,16,0.85)'; ctx.lineWidth = 3;
    ctx.strokeText(f.txt, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  if (game.flash > 0) {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalAlpha = game.flash * 0.3;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
  }

  // A4 vignette: cached corner falloff, redrawn only on resize. Whole frame —
  // subtle enough (LOOK.vignette max alpha) to leave the HUD readable.
  if (LOOK.on && LOOK.vignette > 0) {
    if (!draw.vig || draw.vig.width !== canvas.width || draw.vig.height !== canvas.height || draw.vigA !== LOOK.vignette) {
      draw.vig = document.createElement('canvas');
      draw.vig.width = canvas.width; draw.vig.height = canvas.height;
      draw.vigA = LOOK.vignette;
      const vc = draw.vig.getContext('2d');
      const vr = Math.hypot(canvas.width, canvas.height) / 2;
      const vg = vc.createRadialGradient(canvas.width / 2, canvas.height / 2, vr * 0.55,
                                         canvas.width / 2, canvas.height / 2, vr);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,' + LOOK.vignette + ')');
      vc.fillStyle = vg;
      vc.fillRect(0, 0, canvas.width, canvas.height);
    }
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(draw.vig, 0, 0);
  }
}

// ---------- main loop ----------
// Slow-mo on gate approach is applied to wall-clock time only; the physics path
// is identical steps, just played slower (determinism preserved).
let last = performance.now(), acc = 0;
function frame(now) {
  let ft = (now - last) / 1000; last = now;
  if (ft > 0.1) ft = 0.1;
  if (game.freezeUntil && now < game.freezeUntil) ft = 0;   // 60ms crash hitstop
  if (game.state === 'flight' && game.gateLock) {
    // slow-mo is part of the tell (D-adr-017): it only engages when entry is
    // certain, and deepens gradually on the way in — 1x at the lean ring's edge
    // down to 0.55x at the horizon, eased in over the latch ramp
    const c = game.craft, g = game.sys.layout.gate;
    const ad = Math.hypot(g.x - c.x, g.y - c.y);
    const wgt = Math.max(0, Math.min(1 - (ad - g.r) / (g.r * 1.4), 0.9)) / 0.9;
    const ramp = Math.min((now / 1000 - game.gateLockAt) / 0.35, 1);
    ft *= 1 - 0.45 * wgt * ramp;
  } else if (game.state === 'win' && game.winCraft && !game.winDone) {
    ft *= 0.55;  // the crossing happens at full slow-mo depth; carry the rate through
  }
  // earned peak: triple slingshot dilates the world briefly (P3, once per flight)
  if (game.state === 'flight' && game.tripleAt && (now - game.tripleAt) / 1000 < 0.35) ft *= 0.5;
  acc += ft;
  while (acc >= DT) { tick(DT); acc -= DT; }
  draw();
  if (fxRender) fxRender();
  requestAnimationFrame(frame);
}

// ?daily deep-links straight into TODAY'S SYSTEM (share links carry &g=<ghost>)
if (/[?#&]daily/.test(location.href)) startDaily();
else { loadSystem(1); game.state = 'intro'; }   // one-page how-to-play before the first fling
// warm the game font so the canvas swaps to it within the first frames
if (document.fonts && document.fonts.load) {
  for (const w of [600, 700, 800]) document.fonts.load(w + ' 30px Oxanium').catch(() => {});
}
requestAnimationFrame(frame);

// ---------- ?fx spike v2: WebGL bloom overlay over the untouched 2D frame ----------
// The 2D canvas keeps rendering as shipped and STAYS VISIBLE as the base layer.
// With ?fx, each frame is downsampled to quarter res on a scratch 2D canvas,
// uploaded to a WebGL1 overlay (16x less data than the v1 full-res upload that
// made iOS jerky), bright-passed + blurred there, and the resulting GLOW ONLY
// is additively blended over the game via CSS plus-lighter (screen fallback).
// The overlay backing store is quarter res too — a blurred glow upscales free.
// pointer-events:none, so input still lands on the game canvas. Any init
// failure removes the overlay: fallback is the vanilla game.
// Meter (top-left) shows fps + per-frame downsample+upload cost; TAP to A/B.
let fxRender = null;
(function initFX() {
  if (!/[?#&]fx/.test(location.href)) return;
  const meter = document.createElement('div');
  meter.style.cssText = 'position:fixed;top:64px;left:8px;z-index:9;font:11px ui-monospace,monospace;color:#8ef5ff;background:rgba(4,8,16,.6);padding:4px 8px;border-radius:5px;white-space:pre;user-select:none;-webkit-user-select:none';
  meter.textContent = 'FX: init…';
  document.body.appendChild(meter);
  let gl, glc;
  const blend = (window.CSS && CSS.supports && CSS.supports('mix-blend-mode', 'plus-lighter')) ? 'plus-lighter' : 'screen';
  try {
    glc = document.createElement('canvas');
    glc.style.cssText = 'position:fixed;left:0;top:0;pointer-events:none;z-index:5;mix-blend-mode:' + blend;
    gl = glc.getContext('webgl', { alpha: false, antialias: false, depth: false, stencil: false, powerPreference: 'high-performance' });
  } catch (e) { gl = null; }
  if (!gl) { meter.textContent = 'FX: WebGL unavailable — vanilla'; return; }
  document.body.appendChild(glc);
  const ds = document.createElement('canvas');           // quarter-res downsample scratch
  const dctx = ds.getContext('2d', { alpha: false });

  const FXP = { on: true, strength: 0.85, threshold: 0.45, knee: 0.35, scale: 0.25 };
  window.GG_FX = FXP;
  meter.addEventListener('pointerdown', e => { e.preventDefault(); FXP.on = !FXP.on; LOOK.on = FXP.on; });

  const VS = 'attribute vec2 p;varying vec2 v;void main(){v=p*.5+.5;gl_Position=vec4(p,0.,1.);}';
  const FS_BRIGHT = 'precision mediump float;varying vec2 v;uniform sampler2D t;uniform float th,kn;' +
    'void main(){vec4 c=texture2D(t,v);float l=dot(c.rgb,vec3(.299,.587,.114));gl_FragColor=vec4(c.rgb*smoothstep(th,th+kn,l),1.);}';
  const FS_BLUR = 'precision mediump float;varying vec2 v;uniform sampler2D t;uniform vec2 d;' +
    'void main(){vec3 s=texture2D(t,v).rgb*.227027;' +
    's+=(texture2D(t,v+d*1.3846).rgb+texture2D(t,v-d*1.3846).rgb)*.3162162;' +
    's+=(texture2D(t,v+d*3.2308).rgb+texture2D(t,v-d*3.2308).rgb)*.0702703;gl_FragColor=vec4(s,1.);}';
  const FS_ADD = 'precision mediump float;varying vec2 v;uniform sampler2D t;uniform float k;' +
    'void main(){gl_FragColor=vec4(texture2D(t,v).rgb*k,1.);}';

  function shader(type, src) {
    const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
    return s;
  }
  function program(fs) {
    const p = gl.createProgram();
    gl.attachShader(p, shader(gl.VERTEX_SHADER, VS));
    gl.attachShader(p, shader(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
    return p;
  }
  let pBright, pBlur, pAdd;
  try { pBright = program(FS_BRIGHT); pBlur = program(FS_BLUR); pAdd = program(FS_ADD); }
  catch (e) { meter.textContent = 'FX: shader fail — vanilla'; glc.remove(); return; }

  const quad = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  function drawQuad(p) {
    const loc = gl.getAttribLocation(p, 'p');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }
  function makeTex(w, h) {
    const t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    if (w) gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    return t;
  }
  function makeTarget(w, h) {
    const tex = makeTex(w, h), fb = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    return { tex, fb };
  }
  const srcTex = makeTex(0, 0);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  let sw = 0, sh = 0, bw = 0, bh = 0, tgA = null, tgB = null;
  function ensureSize() {
    if (canvas.width === sw && canvas.height === sh) return;
    sw = canvas.width; sh = canvas.height;
    bw = Math.max(1, Math.round(sw * FXP.scale));
    bh = Math.max(1, Math.round(sh * FXP.scale));
    glc.width = bw; glc.height = bh;                       // quarter-res backing store,
    glc.style.width = canvas.style.width;                  // CSS-stretched to full size
    glc.style.height = canvas.style.height;
    ds.width = bw; ds.height = bh;
    if (tgA) { gl.deleteTexture(tgA.tex); gl.deleteFramebuffer(tgA.fb); gl.deleteTexture(tgB.tex); gl.deleteFramebuffer(tgB.fb); }
    tgA = makeTarget(bw, bh); tgB = makeTarget(bw, bh);
  }
  function pass(p, fb, w, h, tex, set) {
    gl.useProgram(p);
    gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
    gl.viewport(0, 0, w, h);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.uniform1i(gl.getUniformLocation(p, 't'), 0);
    if (set) set(p);
    drawQuad(p);
  }
  // meter state: EMA fps + EMA upload ms, refreshed twice a second
  let lastT = 0, fpsE = 0, upE = 0, lastMeter = 0;
  fxRender = function () {
    const t0 = performance.now();
    if (lastT) { const f = 1000 / (t0 - lastT); fpsE = fpsE ? fpsE * 0.95 + f * 0.05 : f; }
    lastT = t0;
    if (!FXP.on) {
      if (glc.style.display !== 'none') glc.style.display = 'none';
    } else {
      if (glc.style.display === 'none') glc.style.display = '';
      ensureSize();
      dctx.drawImage(canvas, 0, 0, bw, bh);                // GPU blit, not a readback
      gl.bindTexture(gl.TEXTURE_2D, srcTex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, ds);
      const t1 = performance.now();
      upE = upE ? upE * 0.9 + (t1 - t0) * 0.1 : (t1 - t0);
      pass(pBright, tgA.fb, bw, bh, srcTex, p => {
        gl.uniform1f(gl.getUniformLocation(p, 'th'), FXP.threshold);
        gl.uniform1f(gl.getUniformLocation(p, 'kn'), FXP.knee);
      });
      pass(pBlur, tgB.fb, bw, bh, tgA.tex, p => gl.uniform2f(gl.getUniformLocation(p, 'd'), 1 / bw, 0));
      pass(pBlur, tgA.fb, bw, bh, tgB.tex, p => gl.uniform2f(gl.getUniformLocation(p, 'd'), 0, 1 / bh));
      pass(pAdd, null, bw, bh, tgA.tex, p => gl.uniform1f(gl.getUniformLocation(p, 'k'), FXP.strength));
    }
    if (t0 - lastMeter > 500) {
      lastMeter = t0;
      meter.textContent = 'FX ' + (FXP.on ? 'ON' : 'OFF') + ' [' + LOOK.rev + '] · tap to toggle\n' +
        fpsE.toFixed(0) + ' fps · upload ' + upE.toFixed(1) + ' ms';
    }
  };
})();

// ---------- debug hooks (used by automated tests; harmless in play) ----------
window.GG = {
  game, simulate, solve, genSystem, difficulty, previewT, straightShotWins,
  SCORE, PT, INSERT, DAILY, pathMetrics, measureRemainder, escapeGate, endRun, loadSystem, sysName,
  startDaily, finishDaily, exitDaily,
  OBJ, OBJECTIVES, objMask, objEvent, galaxyDone, galaxiesDone, objSpotlight,
  fling: (vx, vy) => fling(vx, vy),
  flingSolution: () => { const s = game.sys.sol; fling(s.vx, s.vy); return s; },
  newRun,
};
if (window.GG_FX) window.GG.FX = window.GG_FX;   // ?fx bloom dials (on/strength/threshold/knee/scale)
window.GG.LOOK = LOOK;                           // ?fx depth-group dials (twinkle/tint/parallax/wash/vignette)
</script>
</body>
