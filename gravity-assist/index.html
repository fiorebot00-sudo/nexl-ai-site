// repo, /api/gravity/daily) under a 3-char arcade tag; best-per-tag, UTC days.
// Depth 3-7 derives from the date hash so difficulty varies day to day.
const DAILY = (() => {
  const d = new Date();
  const day = String(d.getUTCFullYear()) + String(d.getUTCMonth() + 1).padStart(2, '0') + String(d.getUTCDate()).padStart(2, '0');
  let h = 2166136261 >>> 0;
  for (let i = 0; i < day.length; i++) { h ^= day.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
  return { day, seed: h >>> 0, depth: 3 + (h % 5) };
})();

const STAR_LAYERS = (() => {
  const layers = [];
  for (const [speed, count, size, alpha] of [[6, 50, 0.7, 0.15], [14, 34, 1.0, 0.30], [26, 18, 1.3, 0.50]]) {

function lerpColor(c1, c2, t) {
  const a = parseInt(c1.slice(1), 16), b = parseInt(c2.slice(1), 16);
  const r = Math.round((a >> 16) + (((b >> 16) & 255) - (a >> 16)) * t);
  const g = Math.round(((a >> 8) & 255) + (((b >> 8) & 255) - ((a >> 8) & 255)) * t);
  const bl = Math.round((a & 255) + ((b & 255) - (a & 255)) * t);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

// Orbiter (moon/satellite) position at orbit-time t. Orbiters run FULL TIME
// (D-adr-022): wall clock while aiming, physics time in flight (offset by the
// launch instant, craft.t0, so the handoff is seamless). Determinism is per
// launch state — same fling at the same orbit phase = same path; timing the
// gap is part of the game now.
function orbPos(layout, o, t) {
  const p = layout.planets[o.pi];

// ---------- seeded rng (generation only — physics has no randomness) ----------
function mulberry32(seed) {

    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;

// ---------- physics core (pure: shared by flight, preview, and solver) ----------
function accel(px, py, planets, gscale) {
  let ax = 0, ay = 0;
  for (const p of planets) {
    const dx = p.x - px, dy = p.y - py;
    const d2 = dx * dx + dy * dy;
    const d = Math.sqrt(d2) || 1;
    let a = (G_BASE * gscale * (p.r / 24) * (p.r / 24)) / (d2 + SOFT);
    if (a > A_CAP) a = A_CAP;
    ax += (dx / d) * a;
    ay += (dy / d) * a;
  }
  return [ax, ay];
}

function simulate(layout, vx, vy, maxT, t0) {
  t0 = t0 || 0;                      // orbit-phase offset (0 = generation baseline)
  let x = PAD.x, y = PAD.y;
  const path = [x, y];
  const steps = Math.floor(maxT / DT);
  for (let i = 0; i < steps; i++) {
    const t = t0 + (i + 1) * DT;
    const [ax, ay] = accel(x, y, layout.planets, layout.gscale);
    vx += ax * DT; vy += ay * DT;      // semi-implicit Euler: stable + deterministic
    x += vx * DT; y += vy * DT;
    path.push(x, y);
    for (const p of layout.planets) {
      const dx = x - p.x, dy = y - p.y;
      if (dx * dx + dy * dy < (p.r + CRAFT_R - 1) * (p.r + CRAFT_R - 1))
        return { outcome: 'crash', path, x, y };
    }
    for (const m of (layout.moons || [])) {
      const [mx, my] = orbPos(layout, m, t);
      const dx = x - mx, dy = y - my;
      if (dx * dx + dy * dy < (m.r + CRAFT_R - 1) * (m.r + CRAFT_R - 1))
        return { outcome: 'crash', path, x, y };
    }
    const gx = x - layout.gate.x, gy = y - layout.gate.y;
    if (gx * gx + gy * gy < layout.gate.r * layout.gate.r)
      return { outcome: 'win', path, x, y };
    if (x < BOUNDS.x0 || x > BOUNDS.x1 || y < BOUNDS.y0 || y > BOUNDS.y1)
      return { outcome: 'lost', path, x, y };
  }

function willEnterGate(c, L) {

  let x = c.x, y = c.y, vx = c.vx, vy = c.vy, t = c.t;
  const steps = Math.ceil(Math.min(MAX_FLIGHT - t, 3) / DT);
  for (let i = 0; i < steps; i++) {
    const [ax, ay] = accel(x, y, L.planets, L.gscale);
    vx += ax * DT; vy += ay * DT;
    x += vx * DT; y += vy * DT;
    t += DT;
    for (const p of L.planets) {
      const dx = x - p.x, dy = y - p.y;
      if (dx * dx + dy * dy < (p.r + CRAFT_R - 1) ** 2) return false;
    }
    for (const m of L.moons) {
      const [mx, my] = orbPos(L, m, (c.t0 || 0) + t);
      const dx = x - mx, dy = y - my;
      if (dx * dx + dy * dy < (m.r + CRAFT_R - 1) ** 2) return false;
    }
    const gx = x - L.gate.x, gy = y - L.gate.y;
    if (gx * gx + gy * gy < L.gate.r * L.gate.r) return true;
    if (x < BOUNDS.x0 || x > BOUNDS.x1 || y < BOUNDS.y0 || y > BOUNDS.y1) return false;

// DIRECT INSERTION metrics (D-adr-043). pathMetrics: one pass over a flown path —
// length, max perpendicular drift from the pad→gate chord, and the chord itself
// (to the gate EDGE, where the crossing happens). measureRemainder: at the gateLock
// latch, fly the REST of the flight with the same integrator willEnterGate uses,
// accumulating the same numbers plus would-graze events. Deterministic physics makes
// the combined verdict exact and immutable (the D-adr-017 contract: a yes can never
// become a no) — so the mid-flight gold ignition is a guarantee, never a tease.

function solve(layout) {
  for (let f = 0.35; f <= 1.001; f += 0.05) {
    const v = MIN_V + (MAX_V - MIN_V) * f;
    for (let deg = 25; deg <= 155; deg += 3) {
      const th = deg * Math.PI / 180;
      const vx = Math.cos(th) * v, vy = -Math.sin(th) * v;
      if (simulate(layout, vx, vy, 6).outcome === 'win') return { vx, vy };
    }
  }

function straightShotWins(layout) {

    const th = bearing + dd * Math.PI / 180;
    for (let f = 0.35; f <= 1.001; f += 0.1) {
      const v = MIN_V + (MAX_V - MIN_V) * f;
      if (simulate(layout, Math.cos(th) * v, -Math.sin(th) * v, 6).outcome === 'win')
        return true;
    }
  }
  return false;

// ---------- system generation: gravity-forward from system 1, fast ramp ----------
function difficulty(depth) {
  return {
    nPlanets: Math.min(1 + Math.floor((depth + 1) / 2), 4),      // 1,2,2,3,3,4...
    gscale: Math.min(0.9 + 0.12 * (depth - 1), 1.7),
    gateR: Math.max(26, 54 - 2.2 * (depth - 1)),
  };
}

// Preview: helpful for two systems, then shrinks fast (D-adr-007).
function previewT(depth) {
  return depth <= 2 ? 1.1 : Math.max(0.35, 1.1 - 0.11 * (depth - 2));
}

// ---------- playground: ?playground = empty testbed for entry-feel tuning ----------
// No planets means no gravity: straight, fully predictable shots at just the
// wormhole. The gate wanders per "system" for varied entry angles. Career/best
// are never banked from here (see addCareer/saveBest guards).
const PLAYGROUND = /[?#]playground/.test(location.href);
function playgroundSystem(depth) {
  const rng = mulberry32((depth * 2654435761) >>> 0);

function genSystem(depth, runSeed) {
  const rng = mulberry32((runSeed ^ Math.imul(depth, 2654435761)) >>> 0);
  const diff = difficulty(depth);

  // seeded so each system's feel is part of its identity (identical on retries)
  const galaxy = galaxyFor(depth);

    if (galaxy.decorMode === 'none') return { type: 'clear' };   // the Blueprint plots nothing
    if (galaxy.decorMode === 'brush') {                          // sumi-e strokes, seeded

      const nb2 = 4 + Math.floor(rng() * 3);
      for (let i = 0; i < nb2; i++)

      return { type: 'brush', strokes };

      const hue = galaxy.decor.hues[Math.floor(rng() * galaxy.decor.hues.length)];
      const blobs = [];
      const nb = 3 + Math.floor(rng() * 3);
      for (let i = 0; i < nb; i++)

                     a: ((galaxy.decor.aMin + rng() * (galaxy.decor.aMax - galaxy.decor.aMin)) * dim).toFixed(3), hue });
      return { type: 'nebula', blobs };

      const aScale = (galaxy.decor.aMax / 0.08) * dim;
      for (let i = 0; i < 55; i++) {
        const x = rng() * VW;
        specks.push({ x, y: yBase + x * tilt + (rng() - 0.5) * 90, r: 0.5 + rng() * 1.1,
                      a: (0.06 + rng() * 0.12) * aScale });

  // a system never shows the same world twice; if a galaxy runs out of types the
  // repeat becomes a shade variant (see drawPlanet's detail tint)
  const pickPlanetType = (used) => {
    let pool = Object.keys(galaxy.planets).filter(k => !used.has(k));
    if (!pool.length) pool = Object.keys(galaxy.planets);
    const total = pool.reduce((s, k) => s + galaxy.planets[k], 0);
    let w = rng() * total;
    for (const k of pool) { w -= galaxy.planets[k]; if (w <= 0) { used.add(k); return k; } }
    used.add(pool[pool.length - 1]);

  };

    if (x < r + 16 || x > VW - r - 16 || y < 190 || y > 640) return false;
    const gdx = x - gate.x, gdy = y - gate.y;
    if (gdx * gdx + gdy * gdy < (gate.r + r + 40) ** 2) return false;
    const pdx = x - PAD.x, pdy = y - PAD.y;
    if (pdx * pdx + pdy * pdy < (r + 110) ** 2) return false;
    return !planets.some(q => {
      const dx = q.x - x, dy = q.y - y;
      return dx * dx + dy * dy < (q.r + r + 60) ** 2;

  // relax to plain-solvable so generation always terminates.

    let nPlanets = diff.nPlanets;
    while (nPlanets >= 0) {
      for (let attempt = 0; attempt < 80; attempt++) {
        const gate = {
          x: diff.gateR + 34 + rng() * (VW - 2 * (diff.gateR + 34)),
          y: 58 + diff.gateR,        // gate top clears the HUD even at max radius
          r: diff.gateR,
        };
        const planets = [];
        const usedTypes = new Set();
        let ok = true;
        for (let i = 0; i < nPlanets && ok; i++) {
          let placed = false;
          for (let t = 0; t < 30 && !placed; t++) {
            const r = 18 + rng() * 24;
            let x, y;
            if (i === 0) {
              // corridor guard: sit near the pad->gate line so the shot must curve
              const seg = 0.35 + rng() * 0.35;
              const bx = PAD.x + (gate.x - PAD.x) * seg, by = PAD.y + (gate.y - PAD.y) * seg;
              const dx = gate.x - PAD.x, dy = gate.y - PAD.y, len = Math.hypot(dx, dy);
              const off = (r + 20 + rng() * 60) * (rng() < 0.5 ? -1 : 1);
              x = bx + (-dy / len) * off; y = by + (dx / len) * off;
            } else {
              x = 18 + 24 + rng() * (VW - 84); y = 190 + rng() * 450;
            }
            if (!clearOf(x, y, r, gate, planets)) continue;
            planets.push({ x, y, r, type: pickPlanetType(usedTypes), detail: rng() });
            placed = true;
          }
          if (!placed) ok = false;
        }
        if (!ok) continue;
        const layout = { planets, moons: [], sats: [], gate, gscale: diff.gscale };
        // orbiters: moons are hazards (in the solve, so systems stay fair);
        // satellites are score pickups (solve ignores them — they block nothing)
        if (depth >= 2) {
          let moonCount = 0;
          for (let pi = 0; pi < planets.length; pi++) {
            const p = planets[pi];
            const orbR = p.r + 16 + rng() * p.r * 0.8;
            const oR = 5 + rng() * 4;
            const gd = Math.hypot(p.x - gate.x, p.y - gate.y);
            const pd = Math.hypot(p.x - PAD.x, p.y - PAD.y);
            const onScreen = p.x - orbR > 10 && p.x + orbR < VW - 10 && p.y - orbR > 100 && p.y + orbR < 700;
            if (!onScreen || gd < orbR + gate.r + oR + 12 || pd < orbR + oR + 60) continue;
            const roll = rng();
            // speed tiers assigned round-robin: coexisting orbiters visibly
            // differ in pace (D-adr-022 — "different speeds" is a Mike ask)
            const tier = [0.4, 0.85, 1.4][(layout.moons.length + layout.sats.length) % 3];
            const orb = { pi, orbR, a0: rng() * Math.PI * 2, om: (tier + rng() * 0.25) * (rng() < 0.5 ? -1 : 1) };
            if (depth >= 3 && roll < 0.30 && moonCount < 2) {
              layout.moons.push({ ...orb, r: oR }); moonCount++;
            } else if (roll < 0.65 && layout.sats.length < 2) {   // at most 2 planets carry a satellite (D-adr-033, one per planet by loop)
              layout.sats.push({ ...orb, r: 4, got: false });
            }
          }
        }
        if (strict && nPlanets > 0 && straightShotWins(layout)) continue;
        const sol = solve(layout);   // guaranteed-solvable rule: D-adr-006 (moons included)
        if (sol) return { layout, sol, depth, decor };
      }
      nPlanets--;
    }
  }
  throw new Error('unsolvable empty system — physics broken');
}

  lost: () => tone(300, 90, 0.5, 'sine', 0.12),
  // newlife: warm rising major triad — earned a ship (D-adr-040)

  // DIRECT INSERTION: two pings at the bank ladder's +8-semitone CEILING — a note
  // the player only ever hears here (iOS has no vibration; audio is the tactile
  // channel). Rolls straight into sfx.escape's arpeggio.
  insertion: () => {
    const p = Math.pow(2, 8 / 12);
    tone(1050 * p, 1420 * p, 0.09, 'triangle', 0.17);

  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';

let best = 0, career = 0;

try { career = parseInt(localStorage.getItem('gg_career') || '0', 10) || 0; } catch (e) {}

function addCareer(n) {
  if (PLAYGROUND || game.mode === 'daily') return;   // sandbox/daily never bank to the station
  const before = partsUnlocked(career);
  career += n;
  try { localStorage.setItem('gg_career', String(career)); } catch (e) {}
  const after = partsUnlocked(career);

    game.floats.push({ x: VW / 2, y: VH * 0.42, txt: 'NEW PART: ' + game.partUnlocked, vy: -18, life: 1.6, size: 22, color: '#ffd166' });

}

function saveBest() {
  if (PLAYGROUND || game.mode === 'daily') return false;  // sandbox/daily never touch the record
  if (game.score > best) {
    best = game.score;
    try { localStorage.setItem('gg_best', String(best)); } catch (e) {}
    return true;
  }

}

function loadSystem(depth) {
  // any slingshot reward still in transit lands now — banked is banked (BEST only)
  game.zips.forEach(z => { game.score += z.val; });
  game.zips = [];
  if (game.lifeZips.length) game.lifePunchAt = performance.now();  // ship comet lands instantly (life already granted)
  game.lifeZips = [];
  game.sys = PLAYGROUND ? playgroundSystem(depth) : genSystem(depth, game.runSeed);
  game.depth = depth;
  game.deepestSys = Math.max(game.deepestSys || 1, depth);
  game.state = 'aim';
  game.craft = { x: PAD.x, y: PAD.y, vx: 0, vy: 0, t: 0 };
  game.trail = [];
  game.flightPath = [];
  game.drag = null;
  game.preview = null;
  game.previewPower = 0;
  game.grazed = game.sys.layout.planets.map(() => false);
  game.minGateDist = 1e9;
  game.endT = 0;
  game.solDemo = null;
  game.insert = null;         // insertion FX never outlive their system (D-adr-043)
  game.insertThread = null;
  game.insertRings = null;
  // pick a y-band for the onboarding hints that no planet (or its orbiters) crosses
  game.hintY = (() => {
    for (const fy of [0.60, 0.50, 0.68, 0.42, 0.30]) {
      const hy = VH * fy;
      const clear = game.sys.layout.planets.every((p, i) => {
        let reach = p.r;
        for (const o of game.sys.layout.moons) if (o.pi === i) reach = Math.max(reach, o.orbR + o.r);
        for (const o of game.sys.layout.sats) if (o.pi === i) reach = Math.max(reach, o.orbR + o.r);
        return p.y + reach < hy - 20 || p.y - reach > hy + 34;
      });
      if (clear) return hy;
    }
    return VH * 0.60;
  })();
  game.wormSparks = [];
  for (let i = 0; i < 14; i++)
    game.wormSparks.push({ a: Math.random() * Math.PI * 2, r: Math.random(), sp: 0.7 + Math.random() * 0.7 });
  // vortex stream rails, seeded so retries look identical
  const wrng = mulberry32((game.runSeed ^ Math.imul(depth, 977)) >>> 0);
  game.wormArms = [];
  for (let i = 0; i < 9; i++)
    game.wormArms.push({ a0: (i / 9) * Math.PI * 2 + wrng() * 0.5, ph: wrng(), lite: i % 3 === 0 });
  game.sysLoadAt = performance.now();
  // objective visit window (D-adr-047): counters live for one stay in a galaxy.
  // gi changes on real border crossings AND lap re-entries; newRun/startDaily
  // null gvisit first so a fresh run never inherits stale counters. The arrive
  // event only matters mid-run (arrive-type objectives live at depth 19+).
  const ogi = GALAXIES.indexOf(galaxyFor(depth));
  if (!game.gvisit || game.gvisit.gi !== ogi) {
    const fresh = !game.gvisit;
    game.gvisit = { gi: ogi, sats: 0, deaths: 0, cleared: 0 };
    if (!fresh && game.mode !== 'daily')
      objEvent('arrive', { lives: game.lives, streak: game.escapeStreak });
  }
  // challenger ghost (daily share links): the encoded fling reproduces their
  // exact flight on this same deterministic course
  if (game.mode === 'daily' && DAILY_GHOST && !DAILY_GHOST.path)
    DAILY_GHOST.path = simulate(game.sys.layout, DAILY_GHOST.vx, DAILY_GHOST.vy, MAX_FLIGHT, DAILY_GHOST.t0).path;
  game.orb = { base: 0, at: performance.now() };
  game.ambients = [];
  // galaxy-flavored background specials, up to TWO at once (D-adr-030): naturals
  // are common, unnaturals (man-made/alien) the rare treat. galaxy/aurora/meteor
  // are stationary/screen-wide; the rest drift across.
  const ab = galaxyFor(depth).ambient;
  const SPEED = { comet: 13, asteroid: 8, voyager: 6, ufo: 16, satellite: 7, ringed: 5, sail: 7, hulk: 4, train: 22 };
  const STATIONARY = { galaxy: 1, aurora: 1, meteor: 1 };
  const rollType = () => {
    const r = Math.random();
    if (r < ab.pNat) return ab.naturals[Math.floor(Math.random() * ab.naturals.length)];
    if (r < ab.pNat + ab.pUnnat) return ab.unnaturals[Math.floor(Math.random() * ab.unnaturals.length)];
    return null;
  };
  for (let s = 0; s < 2; s++) {
    const type = rollType();
    if (!type) continue;
    const seed = ((Math.random() * 1e9) >>> 0) || 1;
    if (STATIONARY[type]) {
      game.ambients.push({ type, seed, x: 50 + Math.random() * (VW - 100), y: 130 + Math.random() * 300, rot: Math.random() * 7, vx: 0, vy: 0 });
    } else {
      const fromLeft = Math.random() < 0.5, sp = SPEED[type] || 8;
      game.ambients.push({ type, seed, x: fromLeft ? -40 : VW + 40, y: 110 + Math.random() * 400, vx: (fromLeft ? 1 : -1) * sp, vy: (Math.random() - 0.5) * sp * 0.4, rot: Math.random() * 7 });
    }
  }
}

function newRun() {
  // in-transit slingshot rewards die with the run (chains are BEST-only, D-adr-025)
  game.zips = [];
  game.partUnlocked = null;
  // Course persistence (D-adr-014): retries replay the same course so deaths are
  // learnable (and the ghost trail lines up); a new-best run earns fresh territory.
  if (game.bestBeaten) game.runSeed = (Date.now() & 0xffffffff) >>> 0;
  game.bestBeaten = false;
  // Ghosts are this run's story only. The course may replay (same seed until a
  // new best), but a fresh hangar starts visually clean — without this, prior
  // runs' trails reappear on every repeated system.
  game.ghosts = [];
  game.lives = START_LIVES;
  game.score = 0;
  game.dispScore = 0;
  game.satsRun = 0;
  game.escapeStreak = 0;
  game.deepestSys = 1;
  game.bestChainVal = 0;
  game.chainThisFlight = 0;
  game.sysFails = 0;
  game.insertsRun = 0;
  game.gvisit = null;                 // fresh run, fresh objective-visit window
  loadSystem(1);
}

function finishDaily(escaped) {

// an incoming challenge: ?daily&g=<b64url [vx,vy,t0,scorePts,tag]>
const DAILY_GHOST = (() => {
  const m = location.href.match(/[?&#]g=([A-Za-z0-9_-]+)/);
  if (!m) return null;
  try {
    const a = JSON.parse(atob(m[1].replace(/-/g, '+').replace(/_/g, '/')));
    if (!Number.isFinite(a[0]) || !Number.isFinite(a[1])) return null;
    return { vx: +a[0], vy: +a[1], t0: +a[2] || 0, score: Math.round(+a[3]) || 0,
             tag: String(a[4] || 'RIVAL').slice(0, 5), path: null };
  } catch (e) { return null; }
})();

function dragVelocity(d) {
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const dx = (d.sx - d.cx) / (scale / dpr), dy = (d.sy - d.cy) / (scale / dpr);
  const len = Math.hypot(dx, dy);
  if (len < 14) return null;
  const v = Math.min(MIN_V + (MAX_V - MIN_V) * (len / DRAG_FULL), MAX_V);
  return { vx: (dx / len) * v, vy: (dy / len) * v };
}

// current orbit-phase time: what the orbiters' clocks read right now
function orbNow() { return game.orb.base + (performance.now() - game.orb.at) / 1000; }

function fling(vx, vy) {
  game.lastShot = { vx, vy };
  // capture the orbit phase at launch: flight physics continues it seamlessly
  game.craft = { x: PAD.x, y: PAD.y, vx, vy, t: 0, t0: orbNow() };
  game.trail = [];
  game.flightPath = [PAD.x, PAD.y];
  game.state = 'flight';
  game.drag = null;
  game.preview = null;
  game.previewPower = 0;
  game.grazed = game.sys.layout.planets.map(() => false);
  game.minGateDist = 1e9;
  game.gateLock = false;              // entry tell: latches true once the path is a hit
  game.insert = null;                 // fresh flight, fresh insertion verdict
  game.sys.layout.sats.forEach(s => { s.got = false; });
  game.satsThisFlight = 0;
  game.grazesThisFlight = 0;
  game.chainThisFlight = 0;
  game.hintsDone = true;
  game.freezeT = performance.now() / 1000;   // signature motion freezes in flight
  sfx.launch();
}

function endRun(byCrash, x, y, crashPi) {
  // D-adr-048 (Mike): a slingshot you then crash INTO is no slingshot — its
  // reward comet dies with you (it would otherwise bank on the death screen).
  // Grazes banked already, or around OTHER planets, still land (D-adr-021 intact).
  if (byCrash && crashPi >= 0) {
    for (let zi = game.zips.length - 1; zi >= 0; zi--) {
      if (game.zips[zi].pi === crashPi) {
        game.zips.splice(zi, 1);
        game.floats.push({ x, y: y - 20, txt: 'ASSIST VOID', vy: -18, life: 0.9, size: 12, color: '#8fa2c8' });
      }
    }
  }
  game.state = 'dead';
  game.lives--;                       // a ship is lost; retry same system if any remain
  game.escapeStreak = 0;              // losing a ship breaks the perfect-run streak (D-adr-025)
  game.sysFails = (game.sysFails || 0) + 1;   // fails on THIS system (drives the hint, D-adr-032)
  if (game.gvisit) game.gvisit.deaths++;      // objective visit counter (D-adr-047)
  game.deadAt = performance.now();
  game.endT = game.craft.t;
  // orbit clock resumes live exactly where flight physics left it — no jump
  game.orb = { base: game.craft.t0 + game.craft.t, at: performance.now() };
  game.ghosts.push({ seed: game.runSeed, depth: game.depth, path: game.flightPath.slice() });
  const here = game.ghosts.filter(g2 => g2.seed === game.runSeed && g2.depth === game.depth);
  if (here.length > 5) game.ghosts.splice(game.ghosts.indexOf(here[0]), 1);
  if (game.ghosts.length > 40) game.ghosts.shift();
  const g = game.sys.layout.gate;
  const nearMiss = game.minGateDist < g.r + 80;
  game.deadMsg = nearMiss ? 'SO CLOSE' : (byCrash ? 'CRASHED' : 'LOST IN SPACE');
  if (game.lives <= 0 && game.mode !== 'daily') {
    // run over: reveal the proof. Every system is verified solvable (D-adr-006),
    // so show it — the winning trajectory, its telemetry, and a demo flight home.
    // (NOT in the daily: everyone plays the same course all day, and the reveal
    // would hand the board a copyable answer.)
    const s = game.sys.sol;
    game.solDemo = { vx: s.vx, vy: s.vy, at: performance.now(),
                     path: simulate(game.sys.layout, s.vx, s.vy, 6).path };
  }
  if (byCrash) {
    // planet/moon impact shake (D-adr-027): ±9px peak + a 6px directional kick
    // along the impact velocity, decaying 0.42s, after a 60ms hitstop freeze.
    // Applied to the whole frame incl. the HUD (all under the shake transform).
    game.shake = 9; game.shakeDur = 0.42;
    game.shakeAt = performance.now() + 60;      // shake starts after the hitstop
    game.freezeUntil = performance.now() + 60;
    const _sp = Math.hypot(game.craft.vx, game.craft.vy) || 1;
    game.shakeKx = game.craft.vx / _sp * 6;
    game.shakeKy = game.craft.vy / _sp * 6;
    for (let i = 0; i < 18; i++) {
      const th = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 220;
      game.particles.push({ x, y, vx: Math.cos(th) * sp, vy: Math.sin(th) * sp, life: 0.55 });
    }
    sfx.crash();
  } else {
    sfx.lost();
  }
  saveBest();
}

function escapeGate() {
  const assists = game.grazed.filter(Boolean).length;
  // Calibration (D-adr-043): EVERY escape logs its efficiency ratio so INSERT.EFF
  // can be pinned from real play (window.GG.game.insertLog). The latch verdict is
  // authoritative for FX/score; the post-hoc number here doubles as a cross-check.
  const pm = pathMetrics(game.flightPath, game.sys.layout);
  const postE = pm.len / pm.chord;
  if (!PLAYGROUND) game.insertLog.push(+postE.toFixed(4));
  const ins = game.insert;   // DIRECT INSERTION, latched at gateLock: {tier, E} | null
  if (ins && Math.abs(ins.E - postE) > 1e-6)
    console.warn('insertion E mismatch (latch vs flown)', ins.E, postE);
  // Escape economy (D-adr-025, RESEARCH-SCORING §Recommended):
  //   flight multiplier = 1 + grazes-this-flight (capped)
  //   escape bonus       = ESCAPE_BASE · system# · mult   → banks to BEST
  //   streak bonus       = STREAK_STEP · consecutive clean escapes → BEST
  // Only the FLAT base (ESCAPE_BASE · system#, mult/streak stripped) banks to the
  // career/station — decision (a): the 16-stage grind isn't inflated by a hot run.
  // A DIRECT INSERTION multiplies the WHOLE escape ×2 (×3 on a first pass) on top
  // of the assist mult (D-adr-044 — grazes/sats stack, they don't disqualify):
  // precision multiplies whatever the line earned. Run score only, same class as
  // assists; career still banks the flat base below.
  const mult = Math.min(1 + assists, SCORE.MULT_CAP);
  const insMult = ins ? (ins.tier === 2 ? 3 : 2) : 1;
  const escapeBase = SCORE.ESCAPE_BASE * game.depth;   // career-banked portion
  const escapeUnits = escapeBase * mult * insMult;     // full run-score portion
  game.escapeStreak++;
  const streakUnits = game.escapeStreak > 1 ? SCORE.STREAK_STEP * game.escapeStreak : 0;
  game.score += escapeUnits + streakUnits;
  addCareer(escapeBase);                               // base only to the station
  game.deepestSys = Math.max(game.deepestSys, game.depth);
  // galaxy objectives (D-adr-047): judge this escape, then the visit counters
  if (game.gvisit) {
    game.gvisit.cleared++;
    const ls = game.lastShot ? Math.hypot(game.lastShot.vx, game.lastShot.vy) : 0;
    objEvent('esc', { sysFails: game.sysFails || 0, assists, insert: ins,
      thr: (ls - MIN_V) / (MAX_V - MIN_V), t: game.craft.t, lives: game.lives,
      streak: game.escapeStreak, sysIdx: (game.depth - 1) % 3,
      satsThisFlight: game.satsThisFlight || 0 });
    objEvent('visit', game.gvisit);
  }
  game.sysFails = 0;                                   // cleared the system — reset the hint
  game.escapeMult = mult;                              // for the Phase-2 gate reveal
  game.escapeUnits = escapeUnits;
  game.streakUnits = streakUnits;
  game.scorePunchAt = performance.now();
  game.state = 'win';
  game.winAt = performance.now();
  game.endT = game.craft.t;
  game.orb = { base: game.craft.t0 + game.craft.t, at: performance.now() };
  // the entry dive inherits the exact arrival state — continuity by construction.
  // Heading starts at the same BLENDED angle the flight draw was showing (the
  // pre-horizon lean), so the nose cannot snap at the state switch.
  const gw0 = game.sys.layout.gate;
  const c0 = game.craft;
  const spd0 = Math.hypot(c0.vx, c0.vy);
  let ang0 = Math.atan2(c0.vy, c0.vx);
  const adx0 = gw0.x - c0.x, ady0 = gw0.y - c0.y;
  const ad0 = Math.hypot(adx0, ady0);
  const wgt0 = Math.max(0, Math.min(1 - (ad0 - gw0.r) / (gw0.r * 1.4), 0.9))
             * Math.min((performance.now() / 1000 - game.gateLockAt) / 0.35, 1);
  const ta0 = Math.atan2(ady0, adx0);
  ang0 += (((ta0 - ang0 + Math.PI * 3) % (Math.PI * 2)) - Math.PI) * wgt0;
  game.winCraft = { x: c0.x, y: c0.y, vx: Math.cos(ang0) * spd0, vy: Math.sin(ang0) * spd0,
                    d0: Math.max(ad0, gw0.r * 0.5) };
  game.winDone = false;
  // Staged gate reveal (D-adr-026, float-sequence per RESEARCH-SCORING §3): the
  // beat is SYSTEM → ×mult → +resolved → streak, each cued 0.22s later with an
  // ascending bank tick — the deferred "+total" is the tension release (Balatro).
  const g = game.sys.layout.gate;
  const ay = Math.min(Math.max(g.y - g.r - 20, 150), VH - 150);
  const seq = [{ txt: 'SYSTEM ' + game.depth, size: 16, color: '#8fa2c8' }];
  if (mult > 1) seq.push({ txt: 'ASSIST ×' + mult, size: 20, color: '#ffd166', tick: 1 });
  if (ins) {
    // insertion stacks on the assist mult (D-adr-044) — precision doubles the take
    seq.push({ txt: 'DIRECT ×2', size: 20, color: '#ffd166', tick: 2 });
    if (ins.tier === 2) seq.push({ txt: 'FIRST PASS ×3', size: 17, color: '#ffd166', tick: 3 });
  }
  seq.push({ txt: '+' + (escapeUnits * PT), size: 27, color: '#ffd166', tick: 3 });
  if (streakUnits) seq.push({ txt: 'STREAK ×' + game.escapeStreak + '  +' + (streakUnits * PT), size: 17, color: '#7ef0ff', tick: 4 });
  seq.forEach((s, k) => game.floats.push({
    x: g.x, y: ay - k * 28, txt: s.txt, vy: -22, life: 1.3, size: s.size, color: s.color,
    delay: k * 0.22, sfx: s.tick ? (() => sfx.bank(s.tick)) : null,
  }));
  if (ins) {
    // DIRECT INSERTION ceremony (D-adr-043): gold center banner (TRIPLE SLINGSHOT
    // recipe) + the measured deviation in the info register — precision celebrated
    // with precision; violet collapse rings on the gate (WORMHOLE-RESEARCH #5, the
    // gate keeps its own family — no new gold); the flown path becomes the golden
    // thread for the win window; two ceiling pings roll into the escape arpeggio.
    game.floats.push({ x: VW / 2, y: VH * 0.40, txt: 'DIRECT INSERTION', vy: -9, life: 2.5, size: 25, color: '#ffd166' });
    game.floats.push({ x: VW / 2, y: VH * 0.40 + 24, txt: 'DEVIATION +' + ((ins.E - 1) * 100).toFixed(1) + '%',
                       vy: -9, life: 2.3, size: 13, color: '#8fa2c8', delay: 0.15 });
    game.insertThread = { path: game.flightPath.slice(), at: performance.now() };
    game.insertRings = { at: performance.now() };
    game.insertsRun++;
    sfx.insertion();
    // lifetime stats — no new HUD (D-adr-039 pattern): tally line + window.GG only
    try {
      localStorage.setItem('gg_inserts', String((parseInt(localStorage.getItem('gg_inserts') || '0', 10) || 0) + 1));
      const bestE = parseFloat(localStorage.getItem('gg_bestEff') || '9');
      if (ins.E < bestE) localStorage.setItem('gg_bestEff', ins.E.toFixed(4));
    } catch (e) {}
  }
  const isNewBest = saveBest();
  if (isNewBest && !game.bestBeaten) {   // fire the moment BEST falls, mid-run
    game.bestBeaten = true;
    game.floats.push({ x: VW / 2, y: 110, txt: 'NEW HIGH!', vy: -20, life: 1.4, size: 26, color: '#ffd166' });
  }
  sfx.escape(isNewBest);
}

// ---------- input ----------
// pointer position in game space (scale/ox/oy are device-pixel based)
function toGame(e) {
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  return [(e.clientX * dpr - ox) / scale, (e.clientY * dpr - oy) / scale];
}
const inRect = (p, r) => p[0] >= r.x && p[0] <= r.x + r.w && p[1] >= r.y && p[1] <= r.y + r.h;
// daily-end tap targets (fixed layout; drawn in the dailyEnd panel)
const DUI = {
  tag: [0, 1, 2].map(i => ({ x: VW / 2 - 62 + i * 44, y: 300, w: 36, h: 44 })),
  submit: { x: VW / 2 - 80, y: 362, w: 160, h: 40 },
  share: { x: VW / 2 - 170, y: 606, w: 104, h: 42 },
  again: { x: VW / 2 - 52, y: 606, w: 104, h: 42 },
  exit: { x: VW / 2 + 66, y: 606, w: 104, h: 42 },
  introDaily: { x: VW / 2 - 130, y: 706, w: 260, h: 44 },
};
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  audio();                                    // unlock iOS audio on first gesture
  if (game.state === 'intro') {
    if (inRect(toGame(e), DUI.introDaily)) { startDaily(); return; }
    game.state = 'aim';                       // dismiss the how-to-play, start flinging
  } else if (game.state === 'aim') {
    game.drag = { sx: e.clientX, sy: e.clientY, cx: e.clientX, cy: e.clientY };
  } else if (game.state === 'splash' && performance.now() - game.splashAt > 300) {
    game.state = 'aim';
  } else if (game.state === 'dailyEnd' && performance.now() - game.dailyEndAt > 350) {
    const p = toGame(e);
    if (game.dailyEscaped && !game.dailySubmitted) {
      for (let i = 0; i < 3; i++) if (inRect(p, DUI.tag[i])) {
        game.dailyTag[i] = TAG_CHARS[(TAG_CHARS.indexOf(game.dailyTag[i]) + 1) % TAG_CHARS.length];
        sfx.assist(i); return;
      }
      if (inRect(p, DUI.submit)) { submitDaily(); return; }
    }
    if (game.dailyEscaped && inRect(p, DUI.share)) { shareDaily(); return; }
    if (inRect(p, DUI.again)) { startDaily(); return; }
    if (inRect(p, DUI.exit)) { exitDaily(); return; }
  } else if (game.state === 'dead' && performance.now() - game.deadAt > 350) {
    // 350ms guard: a panic-tap from gameplay shouldn't skip the score.
    // Ships left -> retry the same system (ghost shows your last path);
    // hangar empty -> full new run (daily: the day's result panel).
    if (game.lives > 0) loadSystem(game.depth);
    else if (game.mode === 'daily') finishDaily(false);
    else newRun();
  }
});
window.addEventListener('pointermove', e => {
  if (game.state !== 'aim' || !game.drag) return;
  game.drag.cx = e.clientX; game.drag.cy = e.clientY;
  const v = dragVelocity(game.drag);
  if (v) {
    game.preview = simulate(game.sys.layout, v.vx, v.vy, previewT(game.depth), orbNow()).path;
    game.previewPower = (Math.hypot(v.vx, v.vy) - MIN_V) / (MAX_V - MIN_V);
    game.previewVel = v;
  } else {
    game.preview = null;
    game.previewPower = 0;
    game.previewVel = null;
  }
});
window.addEventListener('pointerup', e => {
  if (game.state !== 'aim' || !game.drag) return;
  game.drag.cx = e.clientX; game.drag.cy = e.clientY;
  const v = dragVelocity(game.drag);
  game.drag = null; game.preview = null;
  if (v) fling(v.vx, v.vy);
});
window.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ---------- tick ----------
function tick(dt) {
  if (game.state === 'flight') {
    const c = game.craft, L = game.sys.layout;
    const [ax, ay] = accel(c.x, c.y, L.planets, L.gscale);
    c.vx += ax * dt; c.vy += ay * dt;
    c.x += c.vx * dt; c.y += c.vy * dt;
    c.t += dt;
    game.trail.push(c.x, c.y);
    if (game.trail.length > 400) game.trail.splice(0, 2);
    game.flightPath.push(c.x, c.y);

    for (let i = 0; i < L.planets.length; i++) {
      const p = L.planets[i];
      const dx = c.x - p.x, dy = c.y - p.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < (p.r + CRAFT_R - 1) ** 2) { endRun(true, c.x, c.y, i); return; }
      if (!game.grazed[i] && d2 < (p.r + ASSIST_MARGIN) ** 2) {
        game.grazed[i] = true;
        game.grazesThisFlight++;
        // slingshot pays NOW (D-adr-021), staged per RESEARCH-SCORE-FX P1c:
        // pop-and-hold at the graze -> comet travel -> banked on impact.
        // Launches queue >=130ms apart so multi-grazes serialize (score-motor).
        // nth graze in a flight is worth CHAIN_STEP·n units — escalating links so
        // the comet/SFX crescendo is honest (D-adr-025, RESEARCH-SCORING §3).
        const n = game.grazesThisFlight;
        const val = SCORE.CHAIN_STEP * n;    // units; banks to BEST only (not career)
        const lastZip = game.zips[game.zips.length - 1];
        const zt0 = Math.max(performance.now(), lastZip ? lastZip.t0 + 130 : 0);
        game.zipCount = (game.zipCount || 0) + 1;
        game.zips.push({ x0: c.x, y0: c.y, t0: zt0, hold: 0.30, dur: 0.62,
                         bend: (game.zipCount % 2 ? 1 : -1) * 110, seed: game.zipCount * 7,
                         val, pi: i });   // pi: crashing into THIS planet voids the reward (D-adr-048)
        game.floats.push({ x: p.x, y: p.y - p.r - 12,
          txt: '+' + (val * PT) + (n > 1 ? '  ×' + n : ''),
          vy: -26, life: 0.8, size: 14, color: '#ffd166' });
        sfx.assist(game.grazesThisFlight - 1);
        objEvent('graze', { chain: n });               // INK CHAIN / CORAL CHAIN class
        if (game.grazesThisFlight === 3) {
          // earned peak, once per flight (Peggle rule): brief world slow-mo
          game.tripleAt = performance.now();
          game.floats.push({ x: VW / 2, y: VH * 0.4, txt: 'TRIPLE SLINGSHOT!', vy: -18, life: 1.2, size: 24, color: '#ffd166' });
        }
      }
    }
    for (const m of L.moons) {
      const [mx, my] = orbPos(L, m, c.t0 + c.t);
      const dx = c.x - mx, dy = c.y - my;
      if (dx * dx + dy * dy < (m.r + CRAFT_R - 1) ** 2) { endRun(true, c.x, c.y); return; }
    }
    for (const s of L.sats) {
      if (s.got) continue;
      const [sx, sy] = orbPos(L, s, c.t0 + c.t);
      const dx = c.x - sx, dy = c.y - sy;
      if (dx * dx + dy * dy < 16 * 16) {
        s.got = true;
        game.score += SCORE.SAT;               // +50, banks to career (base value)
        game.satsThisFlight = (game.satsThisFlight || 0) + 1;
        game.satsRun++;
        if (game.gvisit) game.gvisit.sats++;           // objective visit counter
        game.satPunchAt = performance.now();
        addCareer(SCORE.SAT);
        game.scorePunchAt = performance.now();
        // every SATS_PER_LIFE banked sats earns a ship, up to the hangar cap (D-adr-040)
        // (not in the daily — its 3 ships are the whole contest)
        const earnedLife = game.mode !== 'daily' && game.satsRun % SATS_PER_LIFE === 0 && game.lives < MAX_LIVES;
        if (earnedLife) {
          game.lives++;
          game.floats.push({ x: sx, y: sy - 12, txt: '+' + PT + ' SAT', vy: -26, life: 0.9, size: 15, color: '#ffd166' });
          // unmissable notification (D-adr-042): center banner + cyan ship-comet
          // flying to the new hangar pip (same reward language as slingshot zips)
          game.floats.push({ x: VW / 2, y: VH * 0.42, txt: 'EXTRA SHIP BANKED', vy: -14, life: 1.8, size: 25, color: '#7ef0ff' });
          game.lifeZips.push({ x0: sx, y0: sy, tx: 26 + (game.lives - 1) * 18, ty: VH - 54,
            t0: performance.now(), hold: 0.34, dur: 0.66, bend: -50, seed: (sx * 7 + sy) % 100 });
          sfx.assist(); sfx.newlife();
        } else {
          // subtle progress toward the next ship, unless the hangar is already full
          const need = game.lives < MAX_LIVES ? '  ' + (game.satsRun % SATS_PER_LIFE) + '/' + SATS_PER_LIFE : '';
          game.floats.push({ x: sx, y: sy - 12, txt: '+' + PT + ' SAT' + need, vy: -26, life: 0.9, size: 15, color: '#ffd166' });
          sfx.assist();
        }
      }
    }
    const gdx = c.x - L.gate.x, gdy = c.y - L.gate.y;
    const gd = Math.sqrt(gdx * gdx + gdy * gdy);
    if (gd < game.minGateDist) game.minGateDist = gd;
    if (gd < L.gate.r) { escapeGate(); return; }
    if (c.x < BOUNDS.x0 || c.x > BOUNDS.x1 || c.y < BOUNDS.y0 || c.y > BOUNDS.y1 || c.t > MAX_FLIGHT) {
      endRun(false, c.x, c.y); return;
    }
    // Entry tell: inside the lean ring, check whether this exact trajectory
    // enters the gate. Latched — deterministic physics means a "yes" can never
    // become a "no", so the rotation is a guarantee, not a hint.
    if (!game.gateLock && gd < L.gate.r * 2.4 && willEnterGate(c, L)) {
      game.gateLock = true;
      game.gateLockAt = performance.now() / 1000;   // ramps the lean + slow-mo in
      // DIRECT INSERTION pre-arm (D-adr-043): at the moment of certainty, measure
      // flown-so-far + the exact remainder (same integrator) — the verdict is final
      // here, so the gold ignition can never fire on a lie. Geometry only (D-adr-044):
      // grazes/sats along the line stack with it rather than disqualifying.
      if (!PLAYGROUND) {
        const rem = measureRemainder(c, L);
        if (rem) {
          const fm = pathMetrics(game.flightPath, L);
          const E = (fm.len + rem.len) / fm.chord;
          const dev = Math.max(fm.dev, rem.dev);
          if (E <= INSERT.EFF && dev <= Math.max(L.gate.r, INSERT.DEV_FRAC * fm.chord))
            game.insert = { tier: game.sysFails ? 1 : 2, E };   // 2 = first try on this system
        }
      }
    }
  }
  if (game.state === 'win' && game.winCraft && !game.winDone) {
    const gw = game.sys.layout.gate, w = game.winCraft;
    const dx = gw.x - w.x, dy = gw.y - w.y;
    const d = Math.hypot(dx, dy) || 1;
    if (d < gw.r * 0.12) game.winDone = true;
    else {
      const spd = Math.max(Math.hypot(w.vx, w.vy), 240) * (1 + 1.6 * dt);  // ramp inward
      w.vx += (dx / d * spd - w.vx) * Math.min(10 * dt, 1);                 // steer, don't stop
      w.vy += (dy / d * spd - w.vy) * Math.min(10 * dt, 1);
      w.x += w.vx * dt; w.y += w.vy * dt;
    }
  }
  // a DIRECT INSERTION win lingers (D-adr-044, Mike: "give the player time to
  // recognize what's happened") — the golden thread/banner hold before the flash
  const winHold = game.insertThread ? 1500 : 450;
  const winCap = game.insertThread ? 2500 : 1400;
  if (game.state === 'win' &&
      ((game.winDone && performance.now() - game.winAt > winHold) || performance.now() - game.winAt > winCap)) {
    if (game.mode === 'daily') { finishDaily(true); return; }   // one system IS the daily
    game.flash = 1;                       // the flash is now *emerging* into the new system
    const prevGalaxy = galaxyFor(game.depth);
    loadSystem(game.depth + 1);
    if (galaxyFor(game.depth) !== prevGalaxy) {   // crossed into a new galaxy: splash
      game.state = 'splash';
      game.splashAt = performance.now();
      if (game.lives < MAX_LIVES) {             // reaching a new galaxy earns a ship (D-adr-028)
        game.lives++;
        game.floats.push({ x: VW / 2, y: VH * 0.62, txt: '+1 SHIP', vy: -20, life: 1.6, size: 22, color: '#7ef0ff' });
      }
    }
  }
  // splash waits for a tap — no auto-dismiss

  // live preview: orbiters never stop, so a held drag's drawn future must track them
  if (game.state === 'aim' && game.drag && game.previewVel)
    game.preview = simulate(game.sys.layout, game.previewVel.vx, game.previewVel.vy, previewT(game.depth), orbNow()).path;

  // slingshot rewards land — at most ONE bank per frame (serialized ticks,
  // pinball score-motor style) with a streak pitch-ladder + punch escalation
  for (let i = 0; i < game.zips.length; i++) {
    const z = game.zips[i];
    if ((performance.now() - z.t0) / 1000 >= z.hold + z.dur) {
      game.zips.splice(i, 1);
      game.score += z.val;                    // chains bank to BEST only (D-adr-025)
      game.chainThisFlight += z.val;
      if (game.chainThisFlight > game.bestChainVal) game.bestChainVal = game.chainThisFlight;
      const nb = performance.now();
      game.bankStreak = nb - (game.lastBankAt || -1e9) < 2000 ? (game.bankStreak || 0) + 1 : 0;
      game.lastBankAt = nb;
      game.scorePunchAt = nb;
      game.punchPeak = Math.min(1.45 + 0.08 * game.bankStreak, 1.7);
      game.landRingAt = nb;
      game.barFlashAt = nb;
      sfx.bank(game.bankStreak);
      break;
    }
  }
  // earned-ship comet lands -> hangar pip pop + soft tick (life itself was granted at pickup)
  for (let i = game.lifeZips.length - 1; i >= 0; i--) {
    if ((performance.now() - game.lifeZips[i].t0) / 1000 >= game.lifeZips[i].hold + game.lifeZips[i].dur) {
      game.lifeZips.splice(i, 1);
      game.lifePunchAt = performance.now();
      sfx.bank(0);
    }
  }

  if (game.dispScore < game.score)     // count-up: tick toward the real score
    game.dispScore = Math.min(game.score, game.dispScore + Math.max(4, (game.score - game.dispScore) * 6) * dt);

  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
  for (let i = game.floats.length - 1; i >= 0; i--) {
    const f = game.floats[i];
    if (f.delay > 0) { f.delay -= dt; continue; }   // staged reveal: hold until cue
    if (!f.born) { f.born = true; if (f.sfx) f.sfx(); }
    f.y += f.vy * dt; f.life -= dt;
    if (f.life <= 0) game.floats.splice(i, 1);
  }
  if (game.shake > 0 && performance.now() - (game.shakeAt || 0) > (game.shakeDur || 0.42) * 1000) game.shake = 0;
  if (game.flash > 0) game.flash = Math.max(0, game.flash - 2.2 * dt);
}

// ---------- renderers ----------
// E3 stylized planet modes (D-adr-023): the render mode IS the galaxy identity.
// Invariant: the planet edge stays the strongest edge on screen in every mode.
function drawPlanetStylized(p, pm, cols) {
  const { x, y, r, type, detail } = p;
  ctx.save();
  if (pm.mode === 'flat2') {         // papercut: flat tone + hard chord terminator
    if (type === 'saturn') {
      ctx.save();
      ctx.translate(x, y); ctx.rotate(-0.45 + detail * 0.35); ctx.scale(1, 0.32);
      ctx.strokeStyle = 'rgba(217,195,145,0.55)'; ctx.lineWidth = r * 0.26;
      ctx.beginPath(); ctx.arc(0, 0, r * 1.55, Math.PI, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
    ctx.fillStyle = lerpColor(cols[1], pm.tint || '#b98a4e', 0.35);
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.clip();
    ctx.translate(x, y); ctx.rotate(0.52);
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fillRect(r * 0.15, -r * 1.2, r * 1.2, r * 2.4);
    ctx.restore();
    if (type === 'saturn') {
      ctx.save();
      ctx.translate(x, y); ctx.rotate(-0.45 + detail * 0.35); ctx.scale(1, 0.32);
      ctx.strokeStyle = 'rgba(230,210,160,0.65)'; ctx.lineWidth = r * 0.26;
      ctx.beginPath(); ctx.arc(0, 0, r * 1.55, 0, Math.PI); ctx.stroke();
      ctx.restore();
    }
  } else if (pm.mode === 'ink') {    // sumi-e: near-black body, dry-brush outline
    ctx.fillStyle = '#0c0a14';
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(205,190,255,0.65)'; ctx.lineWidth = 1.8;
    const s0 = detail * 7;
    for (const [a0, a1] of [[s0, s0 + 1.9], [s0 + 2.2, s0 + 3.9], [s0 + 4.2, s0 + 5.6]]) {
      ctx.beginPath(); ctx.arc(x, y, r, a0, a1); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(205,190,255,0.15)'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(x, y, r * 0.62, s0 + 1, s0 + 3.4); ctx.stroke();
    if (type === 'saturn') {
      ctx.save();
      ctx.translate(x, y); ctx.rotate(-0.45 + detail * 0.35); ctx.scale(1, 0.32);
      ctx.strokeStyle = 'rgba(205,190,255,0.35)'; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(0, 0, r * 1.55, 0, 7); ctx.stroke();
      ctx.restore();
    }
  } else if (pm.mode === 'wire') {   // blueprint: rim + meridians, nothing rendered
    ctx.fillStyle = '#0b0b10';
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(170,180,205,0.55)'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.stroke();
    ctx.strokeStyle = 'rgba(170,180,205,0.25)'; ctx.lineWidth = 1;
    for (const xs of [0.45, 0.8]) {
      ctx.save(); ctx.translate(x, y); ctx.scale(xs, 1);
      ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.stroke();
      ctx.restore();
    }
    ctx.save(); ctx.translate(x, y); ctx.scale(1, 0.35);
    ctx.globalAlpha = 0.12;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.stroke();
    ctx.restore();
    if (type === 'saturn') {
      ctx.save();
      ctx.translate(x, y); ctx.rotate(-0.45 + detail * 0.35); ctx.scale(1, 0.32);
      ctx.strokeStyle = 'rgba(170,180,205,0.3)'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.arc(0, 0, r * 1.55, 0, 7); ctx.stroke();
      ctx.restore();
    }
  } else if (pm.mode === 'eclipse') { // the lens: rim-lit toward the unseen center
    ctx.fillStyle = '#060410';
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
    const dir = Math.atan2(-240 - y, VW / 2 - x);
    ctx.strokeStyle = 'rgba(160,120,255,0.6)'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(x, y, r, dir - 1.75, dir + 1.75); ctx.stroke();
    ctx.strokeStyle = 'rgba(160,120,255,0.15)'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(x, y, r, dir + Math.PI - 1.0, dir + Math.PI + 1.0); ctx.stroke();
    if (type === 'saturn') {
      ctx.save();
      ctx.translate(x, y); ctx.rotate(-0.45 + detail * 0.35); ctx.scale(1, 0.32);
      ctx.strokeStyle = 'rgba(160,120,255,0.2)'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.arc(0, 0, r * 1.55, 0, 7); ctx.stroke();
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawPlanet(p) {
  const { x, y, r, type, detail } = p;
  // every world is a variant: detail tints the base gradient lighter or darker,
  // so even a repeated type never looks like a copy
  const tint = (detail - 0.5) * 0.36;
  let cols = PLANET_COLORS[type].map(c => lerpColor(c, tint > 0 ? '#ffffff' : '#000000', Math.abs(tint)));
  // galaxy planet treatment (E3): stylized modes take over entirely; duotone and
  // underlit re-tint and continue through the natural pipeline
  const pm = galaxyFor(game.depth).planetMode || null;
  if (pm && (pm.mode === 'ink' || pm.mode === 'wire' || pm.mode === 'flat2' || pm.mode === 'eclipse')) {
    drawPlanetStylized(p, pm, cols);
    return;
  }
  if (pm && (pm.mode === 'duotone' || pm.mode === 'banded' || pm.mode === 'veined')) cols = cols.map(c => lerpColor(c, pm.hex, pm.k));
  if (pm && pm.mode === 'underlit') cols = cols.map(c => lerpColor(c, '#3a1610', 0.25));
  ctx.save();

  if (type === 'saturn') {           // ring: back half behind the body
    ctx.save();
    ctx.translate(x, y); ctx.rotate(-0.45 + detail * 0.35); ctx.scale(1, 0.32);
    ctx.strokeStyle = 'rgba(217,195,145,0.6)';
    ctx.lineWidth = r * 0.30;
    ctx.beginPath(); ctx.arc(0, 0, r * 1.55, Math.PI, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  const grad = pm && pm.mode === 'underlit'
    ? ctx.createRadialGradient(x + r * 0.2, y + r * 0.55, r * 0.1, x, y, r)   // lit by the lava below
    : ctx.createRadialGradient(x - r * 0.35, y - r * 0.4, r * 0.1, x, y, r);
  grad.addColorStop(0, cols[0]); grad.addColorStop(0.55, cols[1]); grad.addColorStop(1, cols[2]);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();

  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.clip();
  // per-galaxy planet FAMILIES (D-adr-038): banded (Void Reef) and molten-veined
  // (Crimson Shoals) take over the whole surface, so every world in the galaxy reads
  // as one family — they replace the per-type detail below
  const famMode = pm && (pm.mode === 'banded' || pm.mode === 'veined');
  if (famMode && pm.mode === 'banded') {
    const nb = 7, seed = Math.floor(detail * 5);
    for (let i = 0; i < nb; i++) {
      const yy = y - r + (i + 0.5) * (2 * r / nb);
      const hh = (2 * r / nb) * (0.55 + ((i * 7 + seed) % 3) * 0.18);
      ctx.fillStyle = i % 2 ? lerpColor(pm.hex, '#ffffff', 0.16) : lerpColor(pm.hex, '#000000', 0.30);
      ctx.globalAlpha = 0.5; ctx.fillRect(x - r, yy - hh / 2, 2 * r, hh);
    }
    ctx.globalAlpha = 1;
    if (detail > 0.5) {                // a great-spot storm on ~half the worlds
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      ctx.beginPath(); ctx.ellipse(x + (detail - 0.5) * r, y + r * 0.18, r * 0.2, r * 0.11, -0.3, 0, 7); ctx.fill();
    }
  } else if (famMode) {                // 'veined'
    ctx.fillStyle = 'rgba(0,0,0,0.34)'; ctx.fillRect(x - r, y - r, 2 * r, 2 * r);   // dark crust
    const vr = mulberry32((Math.floor(x) * 131 + Math.floor(y) * 17 + Math.floor(detail * 97) + 1) >>> 0);
    ctx.lineCap = 'round';
    for (let v = 0; v < 5; v++) {
      let ax = x + (vr() - 0.5) * r * 1.3, ay = y + (vr() - 0.5) * r * 1.3;
      ctx.strokeStyle = 'rgba(255,' + (90 + (vr() * 60 | 0)) + ',60,' + (0.5 + vr() * 0.3).toFixed(2) + ')';
      ctx.shadowColor = 'rgba(255,120,50,0.9)'; ctx.shadowBlur = 6;
      ctx.lineWidth = 1.3 + vr() * 1.3;
      ctx.beginPath(); ctx.moveTo(ax, ay);
      for (let k = 0; k < 3; k++) { ax += (vr() - 0.5) * r * 0.85; ay += (vr() - 0.5) * r * 0.85; ctx.lineTo(ax, ay); }
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,140,70,0.20)';       // faint magma glow
    ctx.beginPath(); ctx.arc(x + r * 0.15, y + r * 0.2, r * 0.5, 0, 7); ctx.fill();
  } else if (type === 'jupiter' || type === 'saturn') {
    const bands = type === 'jupiter'
      ? ['rgba(160,100,50,0.5)', 'rgba(240,220,180,0.45)', 'rgba(140,85,45,0.5)', 'rgba(230,200,150,0.4)']
      : ['rgba(200,160,100,0.4)', 'rgba(245,230,190,0.4)', 'rgba(180,140,90,0.35)'];
    const offs = [-0.55, -0.18, 0.18, 0.55];
    for (let i = 0; i < bands.length; i++) {
      ctx.fillStyle = bands[i];
      ctx.fillRect(x - r, y + offs[i] * r - 0.09 * r, 2 * r, 0.18 * r);
    }
    if (type === 'jupiter') {         // great red spot
      ctx.fillStyle = 'rgba(176,66,31,0.85)';
      ctx.beginPath(); ctx.ellipse(x + r * 0.3, y + r * 0.28, r * 0.22, r * 0.13, 0, 0, 7); ctx.fill();
    }
  } else if (type === 'earth') {
    ctx.fillStyle = 'rgba(47,158,82,0.85)';
    for (const [bx, by, br] of [[-0.35, -0.1, 0.32], [0.3, 0.32, 0.26], [0.15, -0.45, 0.2]]) {
      ctx.beginPath(); ctx.arc(x + bx * r, y + by * r, br * r, 0, 7); ctx.fill();
    }
  } else if (type === 'mercury') {
    ctx.fillStyle = 'rgba(40,36,34,0.3)';
    for (const [bx, by, br] of [[-0.3, -0.2, 0.18], [0.25, 0.1, 0.13], [-0.05, 0.4, 0.11], [0.4, -0.35, 0.09]]) {
      ctx.beginPath(); ctx.arc(x + bx * r, y + by * r, br * r, 0, 7); ctx.fill();
    }
  }
  // duotone accents (E3): caustics (Shallows), ice facets (Shelf), hatching (Rust)
  if (pm && pm.caustic) {
    ctx.strokeStyle = 'rgba(200,245,240,0.12)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, r * 0.88, -2.4, -1.2); ctx.stroke();
  }
  if (pm && pm.facets) {
    ctx.strokeStyle = 'rgba(230,250,255,0.10)'; ctx.lineWidth = r * 0.12;
    for (const fa of [-0.52, -0.17, 0.26]) {
      ctx.save(); ctx.translate(x, y); ctx.rotate(fa);
      ctx.beginPath(); ctx.moveTo(-r * 0.9, -r * 0.45); ctx.lineTo(r * 0.5, -r * 0.45); ctx.stroke();
      ctx.restore();
    }
  }
  if (pm && pm.hatch) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(Math.PI / 4);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let d = -r; d <= r; d += 5) { ctx.moveTo(-r * 1.2, d); ctx.lineTo(r * 1.2, d); }
    ctx.stroke();
    ctx.restore();
    ctx.fillStyle = 'rgba(255,170,120,0.15)';
    for (const [rx2, ry2] of [[-0.35, -0.3], [-0.1, -0.5], [0.15, -0.25]]) {
      ctx.beginPath(); ctx.arc(x + rx2 * r, y + ry2 * r, 1.2, 0, 7); ctx.fill();
    }
  }
  // soft limb shading (darkens the far rim; the forge flips it — dark on TOP)
  const sh = pm && pm.mode === 'underlit'
    ? ctx.createRadialGradient(x + r * 0.2, y + r * 0.55, r * 0.1, x, y, r * 1.02)
    : ctx.createRadialGradient(x - r * 0.45, y - r * 0.5, r * 0.1, x, y, r * 1.02);
  sh.addColorStop(0, 'rgba(0,0,0,0)');
  sh.addColorStop(0.62, 'rgba(0,0,0,0)');
  sh.addColorStop(0.85, 'rgba(0,0,0,0.14)');
  sh.addColorStop(1, 'rgba(0,0,0,0.34)');
  ctx.fillStyle = sh;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  ctx.restore();
  if (pm && pm.mode === 'underlit') {
    // lava rim light on the bottom limb — sells the forge AND guarantees the
    // collision edge stays the strongest edge on the darkest coals
    ctx.strokeStyle = 'rgba(255,140,80,0.4)'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(x, y, r - 0.5, Math.PI * 0.2, Math.PI * 0.8); ctx.stroke();
  }

  if (type === 'saturn') {           // ring: front half over the body
    ctx.save();
    ctx.translate(x, y); ctx.rotate(-0.45 + detail * 0.35); ctx.scale(1, 0.32);
    ctx.strokeStyle = 'rgba(230,210,160,0.75)';
    ctx.lineWidth = r * 0.30;
    ctx.beginPath(); ctx.arc(0, 0, r * 1.55, 0, Math.PI); ctx.stroke();
    ctx.restore();
  }
}

function drawGate(g, now) {
  const { x, y, r } = g;
  // VORTEX STREAMS (docs/WORMHOLE-RESEARCH.md): no disc, no ring — thin spiral
  // rails with light-beads pouring inward, speeding up as they fall (1/r cue).
  // The rails converge on the win zone; no separate halo marker (Mike's call).
  // dark throat
  const throat = ctx.createRadialGradient(x, y, 0, x, y, r * 0.52);
  throat.addColorStop(0, '#0a0616');
  throat.addColorStop(0.6, 'rgba(27,16,64,0.8)');
  throat.addColorStop(1, 'rgba(27,16,64,0)');
  ctx.fillStyle = throat;
  ctx.beginPath(); ctx.arc(x, y, r * 0.52, 0, 7); ctx.fill();
  ctx.lineCap = 'round';
  const rot = now * 0.22;                          // whole vortex precesses slowly
  for (const a of game.wormArms) {
    // faint continuous rail: spiral from 1.5r down to 0.16r
    ctx.beginPath();
    for (let s = 0; s <= 12; s++) {
      const u = s / 12;
      const rad = r * (1.5 - 1.34 * u);
      const ang = a.a0 + rot + u * 2.7;
      const px = x + Math.cos(ang) * rad, py = y + Math.sin(ang) * rad;
      if (s) ctx.lineTo(px, py); else ctx.moveTo(px, py);
    }
    ctx.strokeStyle = 'rgba(138,108,240,0.16)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // beads pouring inward along the rail, brightening as they fall
    ctx.fillStyle = a.lite ? 'rgb(205,180,255)' : 'rgb(150,120,240)';
    for (let k = 0; k < 11; k++) {
      const u = (k / 11 + a.ph + now * 0.16) % 1;
      const rad = r * (1.5 - 1.34 * u);
      const ang = a.a0 + rot + u * 2.7;
      ctx.globalAlpha = 0.2 + 0.55 * u;
      ctx.beginPath();
      ctx.arc(x + Math.cos(ang) * rad, y + Math.sin(ang) * rad, 1.9 - 0.6 * u, 0, 7);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  // infalling sparks spiraling toward the core
  ctx.fillStyle = '#e6dcff';
  for (const sp of game.wormSparks) {
    const f = 1 - ((now * 0.10 * sp.sp + sp.r) % 1);
    const rad = r * (0.14 + 0.8 * f);
    const ang = sp.a + now * sp.sp * 2.2 + (1 - f) * 2.6;
    ctx.globalAlpha = 0.2 + 0.55 * (1 - f);
    ctx.beginPath(); ctx.arc(x + Math.cos(ang) * rad, y + Math.sin(ang) * rad, 1.5, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // pulsing hot core
  const core = ctx.createRadialGradient(x, y, 0, x, y, r * 0.24);
  core.addColorStop(0, 'rgba(255,255,255,' + (0.5 + 0.3 * Math.sin(now * 2.4)) + ')');
  core.addColorStop(0.5, 'rgba(190,160,255,0.35)');
  core.addColorStop(1, 'rgba(190,160,255,0)');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(x, y, r * 0.24, 0, 7); ctx.fill();
}

function drawMoon(mx, my, r) {
  const g = ctx.createRadialGradient(mx - r * 0.3, my - r * 0.35, r * 0.15, mx, my, r);
  g.addColorStop(0, '#c9c5c1'); g.addColorStop(0.6, '#8d8985'); g.addColorStop(1, '#4a4744');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(mx, my, r, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(40,38,36,0.35)';
  ctx.beginPath(); ctx.arc(mx - r * 0.25, my + r * 0.15, r * 0.3, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(mx + r * 0.3, my - r * 0.25, r * 0.2, 0, 7); ctx.fill();
}

// the reward core — gold diamond, role-locked, constant in every galaxy (D-adr-029)
function satGold(now, s) {
  s = s || 1;
  ctx.save();
  ctx.shadowColor = '#ffd166'; ctx.shadowBlur = (7 + 3 * Math.sin(now * 5)) * s;
  ctx.fillStyle = '#ffd166';
  const r = 4 * s;
  ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}
// Per-galaxy satellite forms (D-adr-029): the gold pickup core is constant; the hull
// is native to the galaxy, so it never repeats a silhouette but always reads "grab me".
const SAT_FORMS = ['comms','buoy','origami','crystal','seedpod','astrolabe','drone','amphora','wire','lantern','prism'];
function drawSat(sx, sy, now) {
  const bio = galaxyFor(game.depth);
  const H = '#' + bio.decor.hues[0].split(',').map(n => (+n).toString(16).padStart(2, '0')).join('');
  const form = SAT_FORMS[GALAXIES.indexOf(bio)] || 'comms';
  const t = now;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(now * 0.5);
  ctx.scale(0.72, 0.72);              // forms run smaller on the field (D-adr-033, Mike)
  if (form === 'comms') {
    ctx.fillStyle = '#2f5fd4'; ctx.fillRect(-15, -3, 9, 6); ctx.fillRect(6, -3, 9, 6);
    ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = .8; ctx.strokeRect(-15, -3, 9, 6); ctx.strokeRect(6, -3, 9, 6);
    satGold(now, 1.1); ctx.strokeStyle = '#e8ecf0'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, -8, 4, 3.6, 6.1); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(0, -8); ctx.stroke();
  } else if (form === 'buoy') {
    ctx.globalAlpha = .5; ctx.fillStyle = H; ctx.beginPath(); ctx.arc(0, 0, 14, 0, 7); ctx.fill(); ctx.globalAlpha = 1;
    ctx.strokeStyle = H; ctx.lineWidth = 1.4; for (const s of [-1, 1]) { ctx.beginPath(); ctx.moveTo(s * 4, 10); ctx.quadraticCurveTo(s * 16, 20, s * 10, 30); ctx.stroke(); ctx.fillStyle = H; ctx.beginPath(); ctx.arc(s * 10, 30, 1.6, 0, 7); ctx.fill(); } satGold(now, 1.1);
  } else if (form === 'origami') {
    ctx.strokeStyle = H; ctx.lineWidth = 2.2; ctx.lineJoin = 'round'; ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(13, 0); ctx.lineTo(0, 15); ctx.lineTo(-13, 0); ctx.closePath(); ctx.stroke();
    ctx.lineWidth = 1; ctx.globalAlpha = .6; ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(0, 15); ctx.moveTo(-13, 0); ctx.lineTo(13, 0); ctx.stroke(); ctx.globalAlpha = 1; satGold(now, 1);
  } else if (form === 'crystal') {
    for (let k = 0; k < 5; k++) { ctx.save(); ctx.rotate(k * 1.256); ctx.globalAlpha = .5; ctx.fillStyle = H; ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(4, -15); ctx.lineTo(-2, -16); ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1; ctx.strokeStyle = H; ctx.lineWidth = .8; ctx.stroke(); ctx.restore(); } satGold(now, 1);
  } else if (form === 'seedpod') {
    for (const s of [-1, 1]) { ctx.save(); ctx.scale(s, 1); ctx.fillStyle = lerpColor('#0a1a10', H, .5); ctx.beginPath(); ctx.ellipse(9, 0, 10, 5, -.5, 0, 7); ctx.fill(); ctx.strokeStyle = H; ctx.lineWidth = .8; ctx.globalAlpha = .7; ctx.stroke(); ctx.globalAlpha = 1; ctx.restore(); }
    ctx.fillStyle = H; for (let k = 0; k < 4; k++) { ctx.globalAlpha = .4 + .4 * Math.sin(t * 3 + k); ctx.beginPath(); ctx.arc(Math.cos(k * 1.6) * 17, Math.sin(k * 1.6) * 13, 1.3, 0, 7); ctx.fill(); } ctx.globalAlpha = 1; satGold(now, 1.1);
  } else if (form === 'astrolabe') {
    ctx.strokeStyle = H; ctx.lineWidth = 2; ctx.beginPath(); ctx.ellipse(0, 0, 15, 15, 0, 0, 7); ctx.stroke();
    ctx.lineWidth = 1; ctx.globalAlpha = .7; ctx.beginPath(); ctx.ellipse(0, 0, 15, 6, 0, 0, 7); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.moveTo(0, -15); ctx.lineTo(0, 15); ctx.stroke(); ctx.globalAlpha = 1; satGold(now, 1.2);
  } else if (form === 'drone') {
    ctx.fillStyle = lerpColor('#1a0f08', H, .25); ctx.strokeStyle = lerpColor('#000000', H, .5); ctx.lineWidth = 1.4; ctx.beginPath(); for (let k = 0; k < 6; k++) { const a = k * 1.047; ctx[k ? 'lineTo' : 'moveTo'](Math.cos(a) * 13, Math.sin(a) * 13); } ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = H; for (let k = 0; k < 6; k++) { const a = k * 1.047; ctx.globalAlpha = .7; ctx.beginPath(); ctx.arc(Math.cos(a) * 10, Math.sin(a) * 10, 1.1, 0, 7); ctx.fill(); } ctx.globalAlpha = 1; satGold(now, 1);
  } else if (form === 'amphora') {
    const base = lerpColor('#1a0808', H, .34), edge = lerpColor('#000000', H, .55);
    ctx.fillStyle = base; ctx.strokeStyle = edge; ctx.lineWidth = 1.3;
    ctx.beginPath(); ctx.moveTo(0, -12); ctx.quadraticCurveTo(11, -5, 9, 5); ctx.quadraticCurveTo(6, 14, 0, 17); ctx.quadraticCurveTo(-6, 14, -9, 5); ctx.quadraticCurveTo(-11, -5, 0, -12); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = base; ctx.fillRect(-3.5, -16, 7, 6); ctx.strokeRect(-3.5, -16, 7, 6);
    ctx.lineWidth = 1.7; ctx.beginPath(); ctx.arc(-8, -9, 4.2, -1, 1.7); ctx.stroke(); ctx.beginPath(); ctx.arc(8, -9, 4.2, 1.4, 4.1); ctx.stroke();
    ctx.fillStyle = H; ctx.globalAlpha = .5; for (let k = 0; k < 3; k++) { ctx.beginPath(); ctx.arc(-5 + k * 5, 9, 1.5, 0, 7); ctx.fill(); } ctx.globalAlpha = 1; satGold(now, 1);
  } else if (form === 'wire') {
    ctx.strokeStyle = 'rgba(180,190,215,.7)'; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.arc(0, 0, 14, 0, 7); ctx.stroke(); ctx.beginPath(); ctx.ellipse(0, 0, 5, 14, 0, 0, 7); ctx.moveTo(-14, 0); ctx.lineTo(14, 0); ctx.stroke(); ctx.strokeRect(-18, -3, 8, 6); ctx.strokeRect(10, -3, 8, 6); satGold(now, 1);
  } else if (form === 'lantern') {
    ctx.fillStyle = '#160a06'; ctx.beginPath(); ctx.moveTo(-9, -12); ctx.lineTo(9, -12); ctx.lineTo(11, 10); ctx.lineTo(-11, 10); ctx.closePath(); ctx.fill();
    const g = ctx.createLinearGradient(0, 10, 0, -6); g.addColorStop(0, 'rgba(255,120,40,.7)'); g.addColorStop(1, 'rgba(255,120,40,0)'); ctx.fillStyle = g; ctx.fillRect(-11, -6, 22, 16);
    ctx.fillStyle = H; for (let k = 0; k < 4; k++) { ctx.globalAlpha = .5 + .4 * Math.sin(t * 4 + k); ctx.beginPath(); ctx.arc((k - 1.5) * 5, 10 - ((t * 10 + k * 3) % 18), 1, 0, 7); ctx.fill(); } ctx.globalAlpha = 1; satGold(now, 1.1);
  } else { // prism
    ctx.fillStyle = '#0a0714'; ctx.beginPath(); ctx.arc(0, 0, 13, 0, 7); ctx.fill(); ctx.strokeStyle = H; ctx.lineWidth = 1.8; ctx.beginPath(); ctx.arc(0, 0, 13, -1.2, 1.2); ctx.stroke();
    ctx.globalAlpha = .4; ctx.lineWidth = 1; for (let k = 0; k < 2; k++) { ctx.beginPath(); ctx.arc(0, 0, 18 + k * 5, -.9, .9); ctx.stroke(); } ctx.globalAlpha = 1; satGold(now, 1.1);
  }
  ctx.restore();
}

// Gravity Golf — space station renderer. 16 build stages, one function, no state.
// stage = completed stages (0..16), now = seconds, s = scale (0.5 HUD / 1.8 death / 3 splash).
function drawStation(ctx, cx, cy, s, stage, now) {
  ctx.save();
  ctx.translate(cx, cy); ctx.scale(s, s);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  if (stage <= 0) {                                   // survey ghost: nothing built yet
    ctx.strokeStyle = 'rgba(143,162,200,0.4)'; ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.ellipse(0, 3, 22, 9, -0.15, 0, 7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-13, 0); ctx.lineTo(13, 0);
    ctx.moveTo(0, -8); ctx.lineTo(0, 9); ctx.stroke();
    ctx.setLineDash([]); ctx.restore(); return;
  }
