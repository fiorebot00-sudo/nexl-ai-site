        ctx.globalAlpha = (Math.floor(now * 4) % 4) === k ? 0.9 : 0.25;
        ctx.fillStyle = '#ffd166';
        ctx.beginPath(); ctx.arc(-9.5 + k * 6.3, 2, 1.1, 0, 7); ctx.fill();
      }
    } else if (design === 1) {
      // dark tri-craft: swept delta hull, galaxy-tinted corner lights, canopy
      ctx.fillStyle = '#2a2f3a';
      ctx.beginPath();
      ctx.moveTo(0, -7); ctx.lineTo(12, 4.5); ctx.quadraticCurveTo(0, 8.5, -12, 4.5);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(' + hue + ',0.6)'; ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'rgba(160,235,255,0.45)';
      ctx.beginPath(); ctx.arc(0, 0.5, 3.6, Math.PI, 0); ctx.fill();
      alien(0, -1.1, 0.8);
      const pts = [[0, -6], [10.5, 4], [-10.5, 4]];
      for (let k = 0; k < 3; k++) {
        ctx.globalAlpha = (Math.floor(now * 3) % 3) === k ? 0.95 : 0.25;
        ctx.fillStyle = 'rgb(' + hue + ')';
        ctx.beginPath(); ctx.arc(pts[k][0], pts[k][1], 1.2, 0, 7); ctx.fill();
      }
    } else {
      // ring-ship: open torus with a central glass pod, orbit shimmer, strobes
      ctx.strokeStyle = '#7f8a93'; ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.ellipse(0, 0, 13, 5, 0, 0, 7); ctx.stroke();
      ctx.strokeStyle = 'rgba(' + hue + ',0.5)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(0, 0, 13, 5, 0, now * 1.5, now * 1.5 + 1.4); ctx.stroke();
      ctx.fillStyle = 'rgba(160,235,255,0.5)';
      ctx.beginPath(); ctx.arc(0, -1, 4.2, 0, 7); ctx.fill();
      alien(0, -1.4, 0.9);
      for (const d of [-1, 1]) {
        ctx.globalAlpha = Math.sin(now * 5 + d) > 0 ? 0.9 : 0.2;
        ctx.fillStyle = 'rgb(' + hue + ')';
        ctx.beginPath(); ctx.arc(d * 13, 0, 1.1, 0, 7); ctx.fill();
      }
    }
    ctx.globalAlpha = 0.55;
  } else if (a.type === 'satellite') {
    // derelict hardware: rig layout and panel tint vary by region
    ctx.translate(x, y); ctx.rotate(now * (0.25 + (vb % 3) * 0.12));
    const panel = lerpColor('#3a5c9c', hueHex, 0.3);
    ctx.fillStyle = '#59636c';
    ctx.fillRect(-2.5, -4, 5, 8);
    ctx.fillStyle = panel;
    if (vb % 2) {
      ctx.fillRect(-13, -2, 8, 4); ctx.fillRect(5, -2, 8, 4);
    } else {
      ctx.fillRect(-11, -5, 6, 3.4); ctx.fillRect(-11, 1.6, 6, 3.4);
      ctx.fillRect(5, -5, 6, 3.4); ctx.fillRect(5, 1.6, 6, 3.4);
    }
    ctx.strokeStyle = '#96a0a9'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-5, 0); ctx.lineTo(-2.5, 0);
    ctx.moveTo(2.5, 0); ctx.lineTo(5, 0);
    ctx.stroke();
    if (vb % 3 === 0) { ctx.beginPath(); ctx.arc(0, -6.5, 2.6, Math.PI * 0.1, Math.PI * 0.9, true); ctx.stroke(); }
    else { ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(0, -9); ctx.stroke(); }
  }
  ctx.restore();
}

// gold (0..1, D-adr-043): the DIRECT INSERTION ignition — reward register earned at
// the trajectory-verified latch. The body gradient leans toward gold and the glow
// warms (satGold breathe at the call site); flaps/canards stay stainless, and only
// the in-flight + win-dive call sites ever pass it (pad ship, pips, demo untouched).
function drawShip(x, y, ang, thrust, now, squash, gold) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(ang);
  if (squash) ctx.scale(1 - squash, 1 + squash);  // loaded-spring anticipation on drag
  if (thrust) {
    const len = 11 + Math.sin(now * 43) * 2 + Math.random() * 3;
    const fg = ctx.createLinearGradient(-12, 0, -12 - len, 0);
    fg.addColorStop(0, 'rgba(255,220,120,0.95)');
    fg.addColorStop(0.5, 'rgba(255,130,40,0.8)');
    fg.addColorStop(1, 'rgba(255,60,20,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(-11, -3.2); ctx.lineTo(-12 - len, 0); ctx.lineTo(-11, 3.2);
    ctx.closePath(); ctx.fill();
  }
  // rear flaps
  ctx.fillStyle = '#96a0a9';
  ctx.beginPath(); ctx.moveTo(-11.5, -4); ctx.lineTo(-15.5, -8.5); ctx.lineTo(-6.5, -4.2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-11.5, 4); ctx.lineTo(-15.5, 8.5); ctx.lineTo(-6.5, 4.2); ctx.closePath(); ctx.fill();
  // stainless body + nose (gold-lit when a DIRECT INSERTION is latched)
  ctx.shadowColor = gold ? 'rgba(255,209,102,' + (0.85 * Math.min(gold * 2, 1)).toFixed(3) + ')'
                         : 'rgba(200,230,255,0.8)';
  ctx.shadowBlur = 8 + (gold ? 6 * gold : 0);
  const bg = ctx.createLinearGradient(0, -4.5, 0, 4.5);
  if (gold) {
    bg.addColorStop(0, lerpColor('#eef2f5', '#ffd166', 0.40 * gold));
    bg.addColorStop(0.45, lerpColor('#aeb8c0', '#ffd166', 0.40 * gold));
    bg.addColorStop(1, lerpColor('#59636c', '#ffd166', 0.40 * gold));
  } else {
    bg.addColorStop(0, '#eef2f5'); bg.addColorStop(0.45, '#aeb8c0'); bg.addColorStop(1, '#59636c');
  }
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(-12, -4.5);
  ctx.lineTo(8, -4.5);
  ctx.quadraticCurveTo(14.5, -2.6, 16.5, 0);
  ctx.quadraticCurveTo(14.5, 2.6, 8, 4.5);
  ctx.lineTo(-12, 4.5);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  // forward canards
  ctx.fillStyle = '#8b959e';
  ctx.beginPath(); ctx.moveTo(6, -4.3); ctx.lineTo(3.5, -7); ctx.lineTo(9.5, -4.4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6, 4.3); ctx.lineTo(3.5, 7); ctx.lineTo(9.5, 4.4); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// Galaxy signature touches — layer-1 background flourishes (STYLE-GUIDE §1).
// Per-speck randomness is seeded from depth so retries look identical; sigT is
// frozen during flight so nothing background moves while the ship does.
// E2: per-galaxy sky particle families (bubbles/snow/ash/spores/plankton/flecks).
// Deterministic per galaxy; motion rides sigT so it freezes during flight.
function drawSkyExtras(b, sigT, dim) {
  const mode = b.skyMode;
  if (!mode || mode === 'squares' || mode === 'streaks') return;  // glyph modes live in the star loop
  const rng = mulberry32((GALAXIES.indexOf(b) * 2477 + 991) >>> 0);
  if (mode === 'bubbles') {
    for (let i = 0; i < 10; i++) {
      const x0 = rng() * VW, y0 = rng() * VH, r = 1 + rng() * 1.5, a = 0.06 + rng() * 0.08, ph = rng() * 7;
      ctx.strokeStyle = 'rgba(180,235,230,' + (a * dim).toFixed(3) + ')';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(x0 + Math.sin(sigT + ph) * 4, ((y0 - sigT * 12) % VH + VH) % VH, r, 0, 7);
      ctx.stroke();
    }
  } else if (mode === 'snow') {
    ctx.fillStyle = 'rgb(220,240,255)';
    for (let i = 0; i < 16; i++) {
      const x0 = rng() * VW, y0 = rng() * VH, r = 0.8 + rng() * 0.8, a = 0.06 + rng() * 0.06, ph = rng() * 7;
      ctx.globalAlpha = a * dim;
      ctx.beginPath();
      ctx.arc(x0 + Math.sin(sigT * 0.7 + ph) * 5, (y0 + sigT * 9) % VH, r, 0, 7);
      ctx.fill();
    }
  } else if (mode === 'ash' || mode === 'ashLight') {
    ctx.fillStyle = 'rgb(150,140,135)';
    for (let i = 0; i < (mode === 'ash' ? 12 : 8); i++) {
      const x0 = rng() * VW, y0 = rng() * VH, ph = rng() * 7;
      ctx.globalAlpha = 0.07 * dim;
      ctx.beginPath();
      ctx.arc(x0 + Math.sin(sigT * 0.4 + ph) * 3, (y0 + sigT * 5) % VH, 0.8 + rng() * 0.6, 0, 7);
      ctx.fill();
    }
  } else if (mode === 'spores') {
    ctx.fillStyle = 'rgb(140,255,180)';
    for (let i = 0; i < 10; i++) {
      const x0 = rng() * VW, y0 = rng() * VH, ph = rng() * 7;
      ctx.globalAlpha = 0.05 * dim;
      ctx.beginPath();
      ctx.arc(x0 + Math.sin(sigT * 0.5 + ph) * 6, ((y0 - sigT * 4) % VH + VH) % VH, 2 + rng(), 0, 7);
      ctx.fill();
    }
  } else if (mode === 'plankton') {
    ctx.fillStyle = 'rgb(255,130,150)';
    for (let i = 0; i < 12; i++) {
      const x0 = rng() * VW, y0 = rng() * VH, ph = rng() * 7;
      ctx.globalAlpha = (0.06 + rng() * 0.04) * dim;
      ctx.beginPath();
      ctx.arc(x0 + Math.sin(sigT * 0.35 + ph) * 9, y0 + Math.cos(sigT * 0.3 + ph) * 6, 0.8 + rng() * 0.6, 0, 7);
      ctx.fill();
    }
  } else if (mode === 'flecks') {
    ctx.fillStyle = 'rgb(190,170,255)';
    for (let i = 0; i < 20; i++) {
      ctx.globalAlpha = (0.04 + rng() * 0.06) * dim;
      ctx.beginPath(); ctx.arc(rng() * VW, rng() * VH * 0.9, 0.4 + rng() * 0.5, 0, 7); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// E4: silhouette scenery — fills darker than the bg (zero luminance cost, so
// variety here is free). Frame-hugging only: bottom/top bands or <=90px from
// the side edges, never inside the central corridor (|x-VW/2|<130, y 170-650).
function drawScenery(b, sigT) {
  const sc = b.scenery;
  if (!sc) return;
  const rng = mulberry32((GALAXIES.indexOf(b) * 5501 + 77) >>> 0);
  ctx.save();
  if (sc === 'cape') {              // warm dusk band melting into the ground glow
    const g = ctx.createLinearGradient(0, VH - 90, 0, VH);
    g.addColorStop(0, 'rgba(255,190,130,0)'); g.addColorStop(1, 'rgba(255,190,130,0.05)');
    ctx.fillStyle = g;
    ctx.fillRect(0, VH - 90, VW, 90);
  } else if (sc === 'kelp') {       // ribbon columns hugging the side edges
    ctx.fillStyle = '#04100f';
    for (let i = 0; i < 3; i++) {
      const left = i !== 1;
      const bx = left ? 12 + rng() * 40 : VW - 12 - rng() * 40;
      const w = 14 + rng() * 12, top = VH * (0.45 + rng() * 0.1);
      const lean = (left ? 1 : -1) * (20 + rng() * 25);
      ctx.beginPath();
      ctx.moveTo(bx - w / 2, VH);
      ctx.quadraticCurveTo(bx - w / 2 + lean * 0.4, (VH + top) / 2, bx + lean - 2, top);
      ctx.lineTo(bx + lean + 2, top + 6);
      ctx.quadraticCurveTo(bx + w / 2 + lean * 0.4, (VH + top) / 2, bx + w / 2, VH);
      ctx.closePath(); ctx.fill();
      for (let k = 0; k < 3; k++) {  // leaf blades
        const ly = top + 40 + k * 60 + rng() * 20, lx = bx + lean * (1 - k * 0.25);
        ctx.beginPath();
        ctx.ellipse(lx + (left ? 14 : -14), ly, 16, 4.5, (left ? -0.5 : 0.5), 0, 7);
        ctx.fill();
      }
    }
  } else if (sc === 'inkblooms') {  // two vast ink blooms behind everything
    for (const [fx, fy] of [[0.3, 0.3], [0.75, 0.6]]) {
      const r = 180 + rng() * 40;
      const g = ctx.createRadialGradient(VW * fx, VH * fy, 0, VW * fx, VH * fy, r);
      g.addColorStop(0, 'rgba(150,110,220,0.05)'); g.addColorStop(1, 'rgba(150,110,220,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(VW * fx, VH * fy, r, 0, 7); ctx.fill();
    }
  } else if (sc === 'stalactites') {  // hanging ice along the top edge
    ctx.fillStyle = '#060d18';
    for (let i = 0; i < 8; i++) {
      const x = 10 + (i + rng() * 0.6) * (VW - 20) / 8;
      const w = 14 + rng() * 20, h = 20 + rng() * 35;
      ctx.beginPath();
      ctx.moveTo(x - w / 2, 0); ctx.lineTo(x - 3 + rng() * 2, h); ctx.lineTo(x + w / 2, 0);
      ctx.closePath(); ctx.fill();
    }
  } else if (sc === 'canopy') {     // leaf clusters + vines + the colossal frond
    ctx.fillStyle = '#02090a';
    const blob = (bx, by, n, sr) => {
      ctx.beginPath();
      for (let k = 0; k < n; k++) ctx.arc(bx + (rng() - 0.5) * sr * 2.2, by + (rng() - 0.5) * sr * 1.4, sr * (0.5 + rng() * 0.5), 0, 7);
      ctx.fill();
    };
    blob(20, 30, 7, 30);                        // top-left cluster
    blob(VW - 15, VH * 0.5, 6, 26);             // right-edge cluster
    ctx.strokeStyle = '#02090a'; ctx.lineWidth = 3;
    for (let k = 0; k < 3; k++) {               // vines
      const vx = k < 2 ? 30 + k * 30 : VW - 20;
      const vy = k < 2 ? 40 : VH * 0.52;
      ctx.beginPath(); ctx.moveTo(vx, vy);
      ctx.quadraticCurveTo(vx + 20 - k * 15, vy + 60, vx - 10 + rng() * 20, vy + 100 + rng() * 30);
      ctx.stroke();
    }
    ctx.beginPath();                            // the frond, bottom-left, iconic
    ctx.moveTo(8, VH - 20);
    ctx.quadraticCurveTo(30, VH - 120, 66, VH - 185);
    ctx.quadraticCurveTo(34, VH - 120, 16, VH - 20);
    ctx.closePath(); ctx.fill();
    for (let k = 0; k < 5; k++) {
      const u = 0.25 + k * 0.16;
      const px2 = 8 + 58 * u, py2 = VH - 20 - 165 * u;
      ctx.beginPath();
      ctx.ellipse(px2 + 18, py2 - 4, 20 - k * 2.5, 5 - k * 0.5, -0.6 - u * 0.3, 0, 7);
      ctx.fill();
    }
  } else if (sc === 'dunesea') {    // layered ridge silhouettes + the caravan
    const fills = ['#0b0705', '#080503', '#060302'];
    const ridgeY = [0.62, 0.72, 0.82];
    for (let i = 0; i < 3; i++) {
      const cy2 = VH * ridgeY[i] + 800, cx2 = VW / 2 + (i - 1) * 120 + rng() * 40;
      ctx.fillStyle = fills[i];
      ctx.beginPath(); ctx.arc(cx2, cy2, 800, 0, 7); ctx.fill();
    }
    ctx.fillStyle = '#040302';                  // the caravan on the middle ridge
    const my2 = VH * 0.72, mx0 = VW * 0.6;
    for (let k = 0; k < 5; k++) {
      const kx = mx0 + k * (20 + rng() * 8);
      const ky = my2 - Math.pow((kx - VW / 2 - rng() * 40) / 800, 2) * 800 - 3;
      ctx.beginPath(); ctx.arc(kx, ky, 1.6 + rng() * 0.6, 0, 7); ctx.fill();
    }
  } else if (sc === 'gantries') {   // smog bands + edge gantries + pulsing beacon
    for (const fy of [0.30, 0.55]) {
      const g = ctx.createLinearGradient(0, VH * fy - 30, 0, VH * fy + 30);
      g.addColorStop(0, 'rgba(255,150,90,0)'); g.addColorStop(0.5, 'rgba(255,150,90,0.04)'); g.addColorStop(1, 'rgba(255,150,90,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, VH * fy - 30, VW, 60);
    }
    ctx.strokeStyle = '#201009'; ctx.lineWidth = 2;
    const jib = (x0, y0, dir) => {
      ctx.beginPath();
      ctx.moveTo(x0, y0); ctx.lineTo(x0 + dir * 80, y0);
      for (let k = 1; k <= 3; k++) { ctx.moveTo(x0 + dir * k * 22, y0); ctx.lineTo(x0 + dir * k * 22, y0 - 12); }
      ctx.moveTo(x0 + dir * 72, y0); ctx.lineTo(x0 + dir * 72, y0 + 26);   // the hook line
      ctx.stroke();
    };
    jib(0, VH * 0.28, 1);
    jib(VW, VH * 0.62, -1);
    ctx.globalAlpha = Math.max(0, Math.sin(sigT * 2.6)) * 0.12;   // beacon, idle pulse
    ctx.fillStyle = 'rgb(255,170,110)';
    ctx.beginPath(); ctx.arc(80, VH * 0.28, 1.6, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  } else if (sc === 'coral') {      // fans radiating from the frame's low corners
    ctx.strokeStyle = '#0d0406'; ctx.lineWidth = 2; ctx.fillStyle = '#0d0406';
    const fan = (x0, y0, dir, h) => {
      const n = 5 + Math.floor(rng() * 3);
      for (let k = 0; k < n; k++) {
        const a = -Math.PI / 2 + dir * (0.15 + k * 0.18) * (rng() * 0.4 + 0.8);
        const ex2 = x0 + Math.cos(a) * h * (0.7 + rng() * 0.3), ey2 = y0 + Math.sin(a) * h * (0.7 + rng() * 0.3);
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.quadraticCurveTo(x0 + Math.cos(a) * h * 0.5 + dir * 8, y0 + Math.sin(a) * h * 0.5, ex2, ey2);
        ctx.stroke();
        ctx.beginPath(); ctx.arc(ex2, ey2, 2.5, 0, 7); ctx.fill();
      }
    };
    fan(14, VH - 8, 1, 120); fan(60, VH - 4, 1, 70);
    fan(VW - 14, VH - 8, -1, 130); fan(VW - 55, VH - 4, -1, 65);
    fan(4, VH * 0.5, 1, 40);
  } else if (sc === 'grid') {       // drafting grid: the world is only plotted
    ctx.strokeStyle = 'rgba(150,160,190,0.03)'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 28; x < VW; x += 56) { ctx.moveTo(x, 0); ctx.lineTo(x, VH); }
    for (let y = 28; y < VH; y += 56) { ctx.moveTo(0, y); ctx.lineTo(VW, y); }
    ctx.stroke();
  } else if (sc === 'forge') {      // molten horizon + volcano cones
    const g = ctx.createLinearGradient(0, VH - 120, 0, VH - 50);
    g.addColorStop(0, 'rgba(255,120,60,0)'); g.addColorStop(1, 'rgba(255,120,60,0.07)');
    ctx.fillStyle = g;
    ctx.fillRect(0, VH - 120, VW, 70);
    ctx.fillStyle = '#0a0402';
    for (let i = 0; i < 3; i++) {
      const x = 40 + rng() * (VW - 80);
      if (Math.abs(x - PAD.x) < 60) continue;
      const w = 26 + rng() * 20, h = 14 + rng() * 12, y = groundYAt(x) + 2;
      ctx.beginPath();
      ctx.moveTo(x - w / 2, y); ctx.lineTo(x - 3, y - h); ctx.lineTo(x + 3, y - h); ctx.lineTo(x + w / 2, y);
      ctx.closePath(); ctx.fill();
    }
  } else if (sc === 'contours') {   // spacetime rings around the unseen center
    ctx.strokeStyle = 'rgba(150,110,255,0.045)'; ctx.lineWidth = 1.5;
    for (const r of [300, 380, 470, 570]) {
      ctx.beginPath(); ctx.arc(VW / 2, -240, r, 0, 7); ctx.stroke();
    }
  }
  ctx.restore();
}

// Rare deep-background bodies (D-adr-031): a binary star in Crimson Shoals, a
// giant partial cratered planet in Event Horizon. Both stationary, alpha-capped,
// seeded per system so they're a treat on ~40% of those galaxies' systems.
function softStar(x, y, r, col, dim) {
  const c = col.length === 7 ? col : '#ffffff';
  const hxs = [parseInt(c.slice(1, 3), 16), parseInt(c.slice(3, 5), 16), parseInt(c.slice(5, 7), 16)].join(',');
  const g = ctx.createRadialGradient(x, y, 0, x, y, r * 3.2);
  g.addColorStop(0, 'rgba(' + hxs + ',' + (0.34 * dim) + ')'); g.addColorStop(0.3, 'rgba(' + hxs + ',' + (0.09 * dim) + ')'); g.addColorStop(1, 'rgba(' + hxs + ',0)');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r * 3.2, 0, 7); ctx.fill();
  const g2 = ctx.createRadialGradient(x, y, 0, x, y, r * 0.85);
  g2.addColorStop(0, 'rgba(255,255,255,' + (0.4 * dim) + ')'); g2.addColorStop(1, 'rgba(' + hxs + ',0)');
  ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(x, y, r * 0.85, 0, 7); ctx.fill();
}
function drawBackdrop(b, depth, dim) {
  const vb = GALAXIES.indexOf(b);
  if (vb !== 7 && vb !== 10) return;
  const rng = mulberry32((game.runSeed ^ Math.imul(depth, 5209)) >>> 0);
  if (rng() > 0.4) return;                     // only some systems in these galaxies
  if (vb === 7) {                              // CRIMSON SHOALS: binary star
    const hue = b.decor.hues[0];
    const cx = VW * (0.28 + rng() * 0.42), cy = VH * (0.15 + rng() * 0.12), R = 62 + rng() * 30, a = 0.7;
    const p1x = cx + Math.cos(a) * R * 0.42, p1y = cy + Math.sin(a) * R * 0.42 * 0.55;
    const p2x = cx - Math.cos(a) * R, p2y = cy - Math.sin(a) * R * 0.55;
    const brg = ctx.createLinearGradient(p1x, p1y, p2x, p2y);
    brg.addColorStop(0, 'rgba(' + hue + ',' + (0.05 * dim) + ')'); brg.addColorStop(0.5, 'rgba(' + hue + ',' + (0.012 * dim) + ')'); brg.addColorStop(1, 'rgba(255,255,255,' + (0.04 * dim) + ')');
    ctx.save(); ctx.strokeStyle = brg; ctx.lineWidth = 13; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(p1x, p1y); ctx.lineTo(p2x, p2y); ctx.stroke(); ctx.restore();
    softStar(p1x, p1y, 20, '#ff9a4a', dim);
    softStar(p2x, p2y, 12, '#ffffff', dim);
  } else {                                     // EVENT HORIZON: giant partial planet (lower-left)
    const cx = -VW * 0.5, cy = VH * 0.9, R = VW * 1.1;
    const lx = cx + 0.9 * R * 0.75, ly = cy - 0.7 * R * 0.75, rim = '159,120,255';
    ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, R, 0, 7); ctx.clip();
    const g = ctx.createRadialGradient(lx, ly, R * 0.05, cx, cy, R * 1.15);

    // 3 swaying wedges that widen + attenuate as they descend (idle sway only)
    const g = ctx.createLinearGradient(0, 0, 0, VH);
    g.addColorStop(0, 'rgba(150,225,225,0.06)');
    g.addColorStop(0.55, 'rgba(140,220,220,0.035)');
    g.addColorStop(1, 'rgba(130,215,215,0.012)');   // dim on the seabed, never washed out
    ctx.fillStyle = g;
    for (let i = 0; i < 3; i++) {

      const wTop = 46 + i * 14, wBot = wTop + 70;    // spread wider toward the floor
      ctx.beginPath();

      ctx.lineTo(ax + wBot / 2, VH); ctx.lineTo(ax - wBot / 2, VH);

    }
  } else if (sig === 'enso') {
    // Violet Deep: one giant broken ink circle — static, drawn once per frame
    ctx.strokeStyle = 'rgba(160,120,255,0.05)';
    ctx.lineWidth = 24;
    ctx.beginPath(); ctx.arc(VW * 0.5, VH * 0.28, 170, Math.PI * 0.85, Math.PI * 0.85 + Math.PI * 1.61); ctx.stroke();
  } else if (sig === 'aurora') {
    // Ice Shelf: 3 vertical curtain strips swaying on slow sines (idle only)
    for (let i = 0; i < 3; i++) {
      const cx2 = VW * [0.2, 0.45, 0.7][i] + Math.sin(sigT / (5 + i) + i * 2) * 10;
      const w = 30 + i * 5;
      const g = ctx.createLinearGradient(0, 0, 0, 220);
      g.addColorStop(0, 'rgba(120,230,220,0.05)'); g.addColorStop(1, 'rgba(120,230,220,0)');
      ctx.fillStyle = g;

    }
  } else if (sig === 'fireflies') {
    // Emerald Verge: 18 fireflies, two sizes, six of them wandering (idle only)
    ctx.fillStyle = 'rgb(140,255,180)';

      const fx = rng() * VW, fy = rng() * VH * 0.85, ph = rng() * 7, sp = 2 + rng();
      const drift = i < 6 ? 20 : 0;

        ctx.fillStyle = 'rgba(255,110,140,0.05)';

    if (sigT % 6 < 0.034) {

      ctx.fillStyle = 'rgb(190,200,220)';
      ctx.fillRect(0, ((sigT * 131) % VH), VW, 1);

      ctx.globalAlpha = a * dim;
      ctx.beginPath();
      ctx.arc(ex + Math.sin(sigT * 0.8 + ph) * 6, (ey0 - sigT * 9 % VH + VH) % VH, r, 0, 7);
      ctx.fill();

    const g = ctx.createLinearGradient(0, 0, 0, 140);
    g.addColorStop(0, 'rgba(138,108,240,0.05)'); g.addColorStop(1, 'rgba(138,108,240,0)');
    ctx.fillStyle = g;

  } else if (sig === 'cathedral') {
    // Nebula Cathedral (The Shallows, D-adr-036): vast ribbed gas columns framing the
    // route like architecture + faint arch ellipses; evenly spaced, idle sway only
    for (let i = 0; i < 7; i++) {
      const x = -60 + i * 92 + Math.sin(sigT * 0.12 + i) * 6, w = 46 + rng() * 28;
      const rg = ctx.createLinearGradient(x, 0, x + w, VH);

    // side edges + faint plankton motes; fronds sway idle only
    ctx.lineWidth = 2;

// ---------- galaxy launch-site terrain (STYLE-GUIDE: the name implies the ground) ----------
// Deterministic per galaxy (seeded by galaxy index): each galaxy has THE launch
// site, a signature landmark, not a reroll. Dim, low-saturation, under the
// luminance ceiling — terrain reads in the corner of the eye, never competes
// with the flight. Tall features skip the pad band so the gantry stays clean.
function groundYAt(x) { return VH + 560 - Math.sqrt(611 * 611 - (x - VW / 2) ** 2); }
function drawGround(galaxy, now) {
  const style = galaxy.ground && galaxy.ground.style;
  if (!style) return;
  const rng = mulberry32((GALAXIES.indexOf(galaxy) * 7919 + 12345) >>> 0);
  const padBand = x => Math.abs(x - PAD.x) < 34;
  // in-ground texture is clipped to the horizon disc; silhouettes rise above it
  const clipGround = () => { ctx.beginPath(); ctx.arc(VW / 2, VH + 560, 611, 0, 7); ctx.clip(); };
  ctx.save();

    for (let i = 0; i < 6; i++) {
      const x = 14 + rng() * (VW - 28);
      if (padBand(x)) continue;
      const w = 8 + rng() * 12, h = 4 + rng() * 9, y = groundYAt(x);
      ctx.fillStyle = '#161d2b';
      ctx.fillRect(x - w / 2, y - h, w, h + 6);
      ctx.fillStyle = 'rgba(255,217,160,0.55)';
      for (let k = 0; k < 3; k++) {
        if (rng() < 0.7) ctx.fillRect(x - w / 2 + 1.5 + k * (w - 3) / 2.6, y - h + 1.5 + rng() * (h - 3), 1.4, 1.4);
      }
    }
  } else if (style === 'pools') {   // THE SHALLOWS: tide pools catching skylight
    clipGround();
    for (let i = 0; i < 8; i++) {
      const x = 20 + rng() * (VW - 40), y = groundYAt(x) + 6 + rng() * 26;
      const rx = 7 + rng() * 13, ry = 1.6 + rng() * 2;
      ctx.fillStyle = 'rgba(120,255,190,0.10)';
      ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, 7); ctx.fill();
      ctx.strokeStyle = 'rgba(190,255,230,0.16)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, Math.PI, Math.PI * 2); ctx.stroke();
    }
  } else if (style === 'crystals') {  // VIOLET DEEP: translucent spires
    for (let i = 0; i < 9; i++) {
      const x = 12 + rng() * (VW - 24);
      if (padBand(x)) continue;
      const h = 5 + rng() * 15, w = 2 + rng() * 3.5, y = groundYAt(x) + 2, lean = (rng() - 0.5) * 4;
      ctx.fillStyle = 'rgba(180,140,255,0.15)';
      ctx.beginPath(); ctx.moveTo(x - w, y); ctx.lineTo(x + lean, y - h); ctx.lineTo(x + w, y); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(200,170,255,0.22)'; ctx.lineWidth = 0.7;
      ctx.beginPath(); ctx.moveTo(x + lean, y - h); ctx.lineTo(x + w, y); ctx.stroke();
    }
  } else if (style === 'ice') {     // THE ICE SHELF: strata lines + shards
    clipGround();
    ctx.strokeStyle = 'rgba(180,225,255,0.10)'; ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const off = 8 + i * 9 + rng() * 4;
      ctx.beginPath(); ctx.arc(VW / 2, VH + 560, 611 - off, Math.PI * 1.28, Math.PI * 1.72); ctx.stroke();
    }

      const x = 16 + rng() * (VW - 32);
      if (padBand(x)) continue;

      ctx.fillStyle = 'rgba(200,240,255,0.18)';
      ctx.beginPath(); ctx.moveTo(x - 2.5, y); ctx.lineTo(x + (rng() - 0.5) * 3, y - h); ctx.lineTo(x + 2.5, y); ctx.closePath(); ctx.fill();
    }
  } else if (style === 'moss') {    // EMERALD VERGE: soft tufts hugging the curve
    for (let i = 0; i < 14; i++) {
      const x = 10 + rng() * (VW - 20), r = 2 + rng() * 5, y = groundYAt(x) + r * 0.4;
      ctx.fillStyle = 'rgba(120,255,190,' + (0.06 + rng() * 0.07).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(x, y, r, Math.PI, Math.PI * 2); ctx.fill();
    }

      const y0 = VH - 40 + i * 14, amp = 3 + rng() * 4, ph = rng() * 7;
      ctx.fillStyle = 'rgba(255,190,120,' + (0.05 + i * 0.02) + ')';

      for (let x = -10; x <= VW + 10; x += 12) ctx.lineTo(x, y0 + Math.sin(x / 46 + ph) * amp);
      ctx.lineTo(VW + 10, VH + 10); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(255,220,170,0.10)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      for (let x = -10; x <= VW + 10; x += 12) ctx.lineTo(x, y0 + Math.sin(x / 46 + ph) * amp);

      const h = 10 + rng() * 8, y = groundYAt(x) + 2;
      ctx.strokeStyle = 'rgba(210,130,90,0.30)'; ctx.lineWidth = 1.2;
      ctx.beginPath();                                    // A-frame + wheel
      ctx.moveTo(x - 5, y); ctx.lineTo(x, y - h); ctx.lineTo(x + 5, y);
      ctx.moveTo(x - 3, y - h * 0.45); ctx.lineTo(x + 3, y - h * 0.45);
      ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y - h, 2.2, 0, 7); ctx.stroke();
    }
    for (let i = 0; i < 4; i++) {
      const x = 14 + rng() * (VW - 28), w = 10 + rng() * 14, h = 3 + rng() * 4, y = groundYAt(x) + 1;
      ctx.fillStyle = 'rgba(255,150,90,0.08)';
      ctx.beginPath(); ctx.moveTo(x - w / 2, y); ctx.lineTo(x, y - h); ctx.lineTo(x + w / 2, y); ctx.closePath(); ctx.fill();
    }
  } else if (style === 'reef') {    // CRIMSON SHOALS: jagged shoal teeth
    for (let i = 0; i < 12; i++) {
      const x = 10 + rng() * (VW - 20);
      if (padBand(x)) continue;
      const h = 2.5 + rng() * 6, w = 2 + rng() * 4, y = groundYAt(x) + 1.5;
      ctx.fillStyle = 'rgba(255,100,130,' + (0.08 + rng() * 0.08).toFixed(3) + ')';
      ctx.beginPath(); ctx.moveTo(x - w, y); ctx.lineTo(x + (rng() - 0.5) * 2, y - h); ctx.lineTo(x + w, y); ctx.closePath(); ctx.fill();
    }
  } else if (style === 'barren') {  // DEAD SPACE: crater rims, nothing else
    clipGround();
    for (let i = 0; i < 6; i++) {
      const x = 20 + rng() * (VW - 40), y = groundYAt(x) + 8 + rng() * 24;
      const rx = 5 + rng() * 10, ry = rx * 0.32;
      ctx.strokeStyle = 'rgba(160,160,180,0.13)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, 7); ctx.stroke();
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(x, y + 1, rx * 0.8, ry * 0.7, 0, 0, Math.PI); ctx.stroke();
    }
  } else if (style === 'embers') {  // EMBER NEBULA: glowing cracks (breathe with the strobes)
    clipGround();

      const pulse = 0.16 + 0.10 * Math.sin(now * 1.3 + i * 2.1);

      ctx.beginPath(); ctx.moveTo(x0, y0);

      ctx.stroke();
    }
  } else if (style === 'glass') {   // EVENT HORIZON: black glass, violet rim light
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = 'rgba(150,110,255,0.28)'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(VW / 2, VH + 560, 611, Math.PI * 1.3, Math.PI * 1.7); ctx.stroke();
    ctx.globalCompositeOperation = 'source-over';
    clipGround();
    for (let i = 0; i < 5; i++) {   // faint star reflections in the glass
      const x = 20 + rng() * (VW - 40), y = groundYAt(x) + 4 + rng() * 16;
      ctx.strokeStyle = 'rgba(200,190,255,0.07)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + 5 + rng() * 6); ctx.stroke();
    }
